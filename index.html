/* ============================================

const firebaseConfig = {
    apiKey: "AIzaSyAbmUjMnbisMLtG0hgFfxarzpw2VW6y4uY",
    authDomain: "severino-8dc6b.firebaseapp.com",

};
let db = null;
let firebaseOk = false;
function initFirebase() {
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });
        firebaseOk = true;
        return true;
    } catch (e) {
        console.error('Erro init Firebase:', e);
        setStatus('error', 'Erro ao iniciar Firebase: ' + e.message);
        firebaseOk = false;
        return false;
    }

/* ============================================
   IMGBB CONFIG
   ============================================ */
function getImgbbKey() { return localStorage.getItem('portaria_imgbb_key') || '' }
function saveImgbbKey(key) { localStorage.setItem('portaria_imgbb_key', key.trim()) }

/* ============================================
   STATUS BAR
   ============================================ */
function setStatus(t, text) {
    const b = document.getElementById('statusBar');
    if (!b) return;
    b.className = 'status-bar ' + t;
    const i = { online: 'fa-cloud', offline: 'fa-database', error: 'fa-triangle-exclamation', syncing: 'fa-sync fa-spin' };
    b.innerHTML = '<i class="fa-solid ' + (i[t] || 'fa-database') + '"></i><span>' + text + '</span>';
}

   ============================================ */

let qrScanner = null, scannerCallback = null;

function genId() {
    const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let r = '';
    for (let i = 0; i < 20; i++) r += c[Math.floor(Math.random() * c.length)];
    return r;
}
function genCode() {
    const c = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let r = '';
    for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
    return r;
}
function safeP(v) {
    if (!v) return [];
    if (typeof v === 'string') try { return JSON.parse(v) } catch (e) { return [] }
    if (Array.isArray(v)) return v;
    return [];
}
function isB64(s) { return typeof s === 'string' && s.length > 200 && s.startsWith('data:') }
function formatPhone(p) {
    const d = p.replace(/\D/g, '');
    if (d.length === 11) return '(' + d.substr(0, 2) + ') ' + d.substr(2, 5) + '-' + d.substr(7, 4);
    if (d.length === 10) return '(' + d.substr(0, 2) + ') ' + d.substr(2, 4) + '-' + d.substr(6, 4);
    return p;
}
function waUrl(p, m) {
    const d = p.replace(/\D/g, '');
    return 'https://wa.me/' + (d.startsWith('55') ? d : '55' + d) + '?text=' + encodeURIComponent(m);
}
function fmtDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
function fmtDateShort(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}
function isToday(iso) {
    if (!iso) return false;
    const d = new Date(iso), n = new Date();
    return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}
function getR(id) { return state.residents.find(function(r){ return r.id === id }) }
function compressImg(file, maxW, q) {
    maxW = maxW || 800; q = q || 0.5;
    return new Promise(function(res, rej) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxW) { h = (maxW / w) * h; w = maxW }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                res(canvas.toDataURL('image/jpeg', q));
            };
            img.onerror = rej; img.src = e.target.result;
        };
        reader.onerror = rej; reader.readAsDataURL(file);
    });
}

function openScanner(cb, title, sub, hint) {

                showToast('Nao foi possivel acessar a camera.', 'error'); stopScanner();
            });
        } catch(e) { stopScanner() }

}
function onScanSuccess(text) {

}
function confirmScannedCode(c) { stopScanner(); if (scannerCallback) scannerCallback(c); scannerCallback = null }
function resumeScanner() {

/* ============================================
   UPLOAD IMGBB
   ============================================ */
async function uploadPhotoToImgBB(file, folder) {
    var apiKey = getImgbbKey();
    if (!apiKey) {
        showToast('Configure a chave imgBB nas Configuracoes', 'warning');
        return await compressImg(file, 600, 0.4);
    }
    try {
        var compressed = await compressImg(file, 800, 0.5);
        var base64Data = compressed.split(',')[1];
        var formData = new FormData();
        formData.append('key', apiKey);
        formData.append('image', base64Data);
        formData.append('name', folder + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4));
        var response = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        var result = await response.json();
        if (result.success) return result.data.url;
        else throw new Error(result.error?.message || 'Erro imgBB');
    } catch (error) {
        console.error('Erro upload imgBB:', error);
        showToast('Erro ao enviar foto: ' + error.message, 'error');
        return await compressImg(file, 600, 0.4);
    }
}

const DB = {
    async load() {
        if (!firebaseOk || !db) {
            this._loadLocal();
            setStatus('offline', 'Modo local - Firebase nao configurado');
            return;
        }
        setStatus('syncing', 'Conectando ao Firebase...');
        try {
            var results = await Promise.all([
                db.collection('residents').orderBy('createdAt', 'asc').get(),
                db.collection('packages').orderBy('receivedAt', 'desc').get(),
                db.collection('providers').orderBy('createdAt', 'desc').get(),
                db.collection('readings').orderBy('date', 'desc').get()
            ]);
            state.residents = results[0].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, name: data.name || '', apartment: data.apartment || '', whatsapp: data.whatsapp || '', vehicles: Array.isArray(data.vehicles) ? data.vehicles : [], visitors: Array.isArray(data.visitors) ? data.visitors : [], createdAt: data.createdAt || '' };
            });
            state.packages = results[1].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, code: data.code || '', residentId: data.residentId || '', residentName: data.residentName || '', apartment: data.apartment || '', description: data.description || '', trackingCode: data.trackingCode || '', receivedAt: data.receivedAt || '', status: data.status || 'pending', deliveredAt: data.deliveredAt || null, deliveredTo: data.deliveredTo || null, photoUrl: data.photoUrl || null };
            });
            state.providers = results[2].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, residentId: data.residentId || '', apartment: data.apartment || '', name: data.name || '', serviceType: data.serviceType || '', company: data.company || '', phone: data.phone || '', docType: data.docType || '', docNumber: data.docNumber || '', photos: Array.isArray(data.photos) ? data.photos : [], createdAt: data.createdAt || '', accessLog: Array.isArray(data.accessLog) ? data.accessLog : [] };
            });
            state.readings = results[3].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, meterKey: data.meterKey || 'GERAL', value: typeof data.value === 'number' ? data.value : 0, date: data.date || '', operator: data.operator || '', createdAt: data.createdAt || '' };
            });
            this._saveLocal();
            var imgOk = getImgbbKey() ? 'imgBB OK' : 'imgBB nao configurado';
            setStatus('online', 'Conectado ao Firebase - ' + imgOk);
        } catch (e) {
            console.error('Erro Firebase:', e);
            setStatus('error', 'Erro Firebase: ' + (e.message || 'desconhecido') + ' - usando dados locais');
            this._loadLocal();
        }
    },
    async saveR(r) {
        var data = { name: r.name, apartment: r.apartment, whatsapp: r.whatsapp, vehicles: r.vehicles || [], visitors: r.visitors || [], createdAt: r.createdAt || new Date().toISOString() };
        try { if (firebaseOk && db) await db.collection('residents').doc(r.id).set(data, { merge: true }); } catch (e) { console.error('Erro saveR:', e) }
        this._saveLocal();
    },
    async deleteR(id) {
        try { if (firebaseOk && db) await db.collection('residents').doc(id).delete(); } catch (e) { console.error('Erro deleteR:', e) }
        state.residents = state.residents.filter(function(x) { return x.id !== id });
        this._saveLocal();
    },
    async saveReading(r) {
        var data = { meterKey: r.meterKey, value: r.value, date: r.date, operator: r.operator, createdAt: r.createdAt };
        try { if (firebaseOk && db) await db.collection('readings').doc(r.id).set(data, { merge: true }); } catch (e) { console.error('Erro saveReading:', e) }
        var idx = state.readings.findIndex(function(x){ return x.id === r.id; });
        if (idx !== -1) state.readings[idx] = r;
        this._saveLocal();
    },
    async deleteReading(id) {
        try { if (firebaseOk && db) await db.collection('readings').doc(id).delete(); } catch (e) { console.error('Erro deleteReading:', e) }
        state.readings = state.readings.filter(function(x){ return x.id !== id; });
        this._saveLocal();
    },
    async savePkg(p) {
        var data = { code: p.code, residentId: p.residentId, residentName: p.residentName, apartment: p.apartment, description: p.description, trackingCode: p.trackingCode || '', receivedAt: p.receivedAt, status: p.status, deliveredAt: p.deliveredAt, deliveredTo: p.deliveredTo, photoUrl: p.photoUrl || null };
        try { if (firebaseOk && db) await db.collection('packages').doc(p.id).set(data, { merge: true }); } catch (e) { console.error('Erro savePkg:', e) }
        this._saveLocal();
    },
    async savePv(pv) {
        var data = { residentId: pv.residentId, apartment: pv.apartment, name: pv.name, serviceType: pv.serviceType, company: pv.company, phone: pv.phone, docType: pv.docType, docNumber: pv.docNumber, photos: pv.photos || [], createdAt: pv.createdAt || new Date().toISOString(), accessLog: pv.accessLog || [] };
        try { if (firebaseOk && db) await db.collection('providers').doc(pv.id).set(data, { merge: true }); } catch (e) { console.error('Erro savePv:', e) }
        this._saveLocal();
    },
    async deletePv(id) {
        try { if (firebaseOk && db) await db.collection('providers').doc(id).delete(); } catch (e) { console.error('Erro deletePv:', e) }
        state.providers = state.providers.filter(function(x) { return x.id !== id });
        this._saveLocal();
    },
    _saveLocal() {
        try {
            var c = {
                residents: state.residents.map(function(r) { return Object.assign({}, r) }),
                packages: state.packages.map(function(p) { return Object.assign({}, p, { photoUrl: isB64(p.photoUrl) ? null : p.photoUrl }) }),
                providers: state.providers.map(function(pv) { return Object.assign({}, pv, { photos: (pv.photos || []).filter(function(ph) { return !isB64(ph) }), accessLog: pv.accessLog || [] }) }),
                readings: state.readings.map(function(r) { return Object.assign({}, r) })
            };
            localStorage.setItem(LOCAL_KEY, JSON.stringify(c));
        } catch (e) { console.error('Erro save local:', e) }
    },
    _loadLocal() {
        try {
            var s = localStorage.getItem(LOCAL_KEY);
            if (s) {
                var d = JSON.parse(s);
                state.residents = d.residents || [];
                state.packages = d.packages || [];
                state.providers = d.providers || [];
                state.readings = d.readings || [];
            }
        } catch (e) { state.residents = []; state.packages = []; state.providers = []; state.readings = []; }
    }
};

async function deliverMultipleAndNotify(pkgIds, dt) {
    var now = new Date().toISOString();
    var deliveredPkgs = [];
    var rId = null;
    
    for (var i = 0; i < pkgIds.length; i++) {
        var p = state.packages.find(function(x) { return x.id === pkgIds[i] });
        if (p && p.status === 'pending') {
            p.status = 'delivered'; p.deliveredAt = now; p.deliveredTo = dt;
            await DB.savePkg(p);
            deliveredPkgs.push(p);
            rId = p.residentId;
        }
    }
    
    var r = rId ? getR(rId) : null;
    if (r && deliveredPkgs.length > 0) {
        var msg = '*PORTARIA*\n\nEntrega de encomenda(s)!\n\n* Apto: ' + r.apartment + '\n* Recebida por: *' + dt + '*\n\n';
        deliveredPkgs.forEach(function(p, index) {
            msg += '📦 *Entrega ' + (index + 1) + '*\n* Codigo: ' + p.code + '\n* Descricao: ' + p.description + '\n';
            if (p.photoUrl) msg += '📷 Foto: ' + p.photoUrl + '\n';
            msg += '\n';
        });
        msg += 'Data/Hora: ' + fmtDate(now) + '\n\nCaso nao tenha sido voce, contate a portaria.';
        
        var wa = waUrl(r.whatsapp, msg);
        closeModal();
        
        var listDetails = deliveredPkgs.map(function(p){ return '<div class="flex items-center gap-2 text-sm mb-1"><span class="font-heading font-bold text-accent">' + p.code + '</span><span class="text-fg-dim">' + p.description + '</span></div>'; }).join('');
        
        openModal('<div class="p-8 text-center"><div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-5"><i class="fa-solid fa-circle-check text-success text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-xl mb-2">' + deliveredPkgs.length + ' Entregue(s)</h3><p class="text-fg-dim mb-4">Recebida(s) por <strong class="text-fg">' + dt + '</strong></p><div class="text-left max-w-xs mx-auto mb-6 p-4 bg-bg/50 rounded-xl border border-border">' + listDetails + '</div><a href="' + wa + '" target="_blank" class="btn-whatsapp w-full justify-center mb-3"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar Confirmacao</a><button class="btn-secondary w-full justify-center" onclick="closeModal();renderPackages()">Fechar</button></div>');
    } else {
        closeModal(); showToast('Entregue(s)', 'success'); renderPackages();
    }
}

async function execDeliverMultiple(idsStr) {
    var pkgIds = idsStr.split(',');
    var dt = document.getElementById('delTo') ? document.getElementById('delTo').value.trim() : ''; 
    if (!dt) { showToast('Informe quem recebeu', 'error'); return }

   ================================================================ */
function getMeterReadings(key) {
    return (state.readings || []).filter(function(r) { return r.meterKey === key; }).sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
}
function getLastReading(key) { var r = getMeterReadings(key); return r.length > 0 ? r[0] : null; }
function calcConsumption(key) {
    var all = getMeterReadings(key);
    if (all.length < 2) return [];
    var cons = [];
    for (var i = 0; i < all.length - 1; i++) {
        var diff = all[i].value - all[i + 1].value;
        cons.push({ id: all[i].id, date: all[i].date, prevDate: all[i + 1].date, consumption: diff >= 0 ? diff : 0, value: all[i].value, prevValue: all[i + 1].value });
    }
    return cons;
}
function getMonthConsumption(key, year, month) {
    var cons = calcConsumption(key);
    var cicloInicio = localStorage.getItem('ciclo_inicio');
    return cons.filter(function(c) {
        var d = new Date(c.date);
        var anoMesAtual = d.getFullYear() === year && d.getMonth() === month;
        if (!anoMesAtual) return false;
        if (cicloInicio) return d >= new Date(cicloInicio);
        return true;
    });
}
function sumConsumption(arr) { var t = 0; arr.forEach(function(c) { t += c.consumption; }); return t; }
function avgConsumption(key) {
    var cons = calcConsumption(key);
    if (cons.length === 0) return 0;
    return sumConsumption(cons) / cons.length;
}
function predictMonth(key) {
    var avg = avgConsumption(key);
    var now = new Date();
    var daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    var dayOfMonth = now.getDate();
    var currentMonthCons = getMonthConsumption(key, now.getFullYear(), now.getMonth());
    var currentTotal = sumConsumption(currentMonthCons);
    var remainingDays = daysInMonth - dayOfMonth;
    return { daily: Math.round(avg * 1000) / 1000, monthPredicted: Math.round((currentTotal + avg * remainingDays) * 1000) / 1000, currentTotal: Math.round(currentTotal * 1000) / 1000, daysRemaining: remainingDays, daysInMonth: daysInMonth };
}

function renderConsumoChart() {
    var canvas = document.getElementById('consumoChartCanvas');
    if (!canvas) return;
    if (consumoChart) { consumoChart.destroy(); consumoChart = null; }

    var geralCons = calcConsumption('GERAL').slice(0, 30).reverse();
    var comumCons = calcConsumption('COMUM').slice(0, 30).reverse();

    if (geralCons.length === 0 && comumCons.length === 0) return;

    // Criar labels unificados
    var allDates = {};
    geralCons.forEach(function(c) { allDates[c.date] = true; });
    comumCons.forEach(function(c) { allDates[c.date] = true; });
    var labels = Object.keys(allDates).sort().slice(-30);

    var geralData = labels.map(function(d) { var c = geralCons.find(function(x) { return x.date === d; }); return c ? c.consumption : null; });
    var comumData = labels.map(function(d) { var c = comumCons.find(function(x) { return x.date === d; }); return c ? c.consumption : null; });
    var labelShort = labels.map(function(d) { return fmtDateShort(d); });

    var ctx = canvas.getContext('2d');
    consumoChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelShort,
            datasets: [
                { label: 'Geral (Pai)', data: geralData, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#38bdf8', borderWidth: 2 },
                { label: 'Area Comum', data: comumData, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.1)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#a78bfa', borderWidth: 2 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'DM Sans', size: 11 } } } },
            scales: {
                x: { ticks: { color: '#5a6b80', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.03)' } },
                y: { ticks: { color: '#5a6b80', font: { size: 10 }, callback: function(v) { return v + ' m³'; } }, grid: { color: 'rgba(255,255,255,0.03)' }, beginAtZero: true }
            }
        }
    });
}

async function saveNewReadings() {
    var geralVal = document.getElementById('rdGeral').value.trim();
    var comumVal = document.getElementById('rdComum').value.trim();
    var dateStr = document.getElementById('rdDate').value;
    var operator = document.getElementById('rdOperator').value.trim();

    if (!geralVal && !comumVal) { showToast('Informe pelo menos uma leitura', 'error'); return }
    if (!operator) { showToast('Informe o nome do operador', 'error'); return }
    if (!dateStr) { showToast('Informe a data', 'error'); return }

    var dateISO = new Date(dateStr).toISOString();
    var saved = 0;

    if (geralVal) {
        var val = parseFloat(geralVal);
        var lastG = getLastReading('GERAL');
        if (lastG && val < lastG.value) { showToast('Atencao: Leitura geral menor que a anterior!', 'warning'); }
        var nr = { id: genId(), meterKey: 'GERAL', value: val, date: dateISO, operator: operator, createdAt: new Date().toISOString() };
        state.readings.unshift(nr);
        await DB.saveReading(nr);
        saved++;
    }

    if (comumVal) {
        var val2 = parseFloat(comumVal);
        var lastC = getLastReading('COMUM');
        if (lastC && val2 < lastC.value) { showToast('Atencao: Leitura area comum menor que a anterior!', 'warning'); }
        var nr2 = { id: genId(), meterKey: 'COMUM', value: val2, date: dateISO, operator: operator, createdAt: new Date().toISOString() };
        state.readings.unshift(nr2);
        await DB.saveReading(nr2);
        saved++;
    }

    closeModal();
    showToast(saved + ' leitura(ões) salva(s)!', 'success');
    renderHidrometros();
}

function editReadingModal(id) {

            '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                '<div><label class="form-label">Data/Hora</label><input type="datetime-local" class="form-input text-sm" id="editDate" value="' + dateOnly + '"></div>' +
                '<div><label class="form-label">Operador</label><input type="text" class="form-input text-sm" id="editOperator" value="' + (r.operator || '') + '"></div>' +
            '</div>' +
        '</div>' +
        '<div class="p-6 border-t border-border flex items-center justify-end gap-3"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-water" onclick="saveEditedReading(\'' + id + '\')"><i class="fa-solid fa-check"></i> Salvar Alteracao</button></div>'
    );
}

async function saveEditedReading(id) {
    var r = state.readings.find(function(x) { return x.id === id; });
    if (!r) return;
    var newVal = parseFloat(document.getElementById('editValue').value);
    var newDate = document.getElementById('editDate').value;
    var newOp = document.getElementById('editOperator').value.trim();
    var newMeter = document.getElementById('editMeterKey').value;

    if (isNaN(newVal)) { showToast('Valor invalido', 'error'); return }
    if (!newDate) { showToast('Informe a data', 'error'); return }
    if (!newOp) { showToast('Informe o operador', 'error'); return }

    r.meterKey = newMeter;
    r.value = newVal;
    r.date = new Date(newDate).toISOString();
    r.operator = newOp;

    await DB.saveReading(r);
    closeModal();
    showToast('Leitura atualizada!', 'success');
    renderHidrometros();
}

/* ============================================
   GERAR PDF DO RELATORIO
   ============================================ */
function generateWaterPDF() {
    var { jsPDF } = window.jspdf;
    var doc = new jsPDF();

    var geralCons = calcConsumption('GERAL');
    var comumCons = calcConsumption('COMUM');
    var geralPred = predictMonth('GERAL');
    var comumPred = predictMonth('COMUM');
    var now = new Date();
    var mesAtual = now.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

    doc.setFillColor(6, 8, 13);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(56, 189, 248);
    doc.setFontSize(18);
    doc.text('Relatorio de Consumo de Agua', 14, 18);
    doc.setFontSize(10);
    doc.setTextColor(148, 163, 184);
    doc.text('CAGECE - ' + mesAtual, 14, 28);
    doc.text('Gerado em: ' + now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }), 14, 35);

    doc.setTextColor(30, 41, 59);
    doc.setFontSize(13);
    doc.text('Resumo do Mes', 14, 52);

    doc.setFillColor(241, 245, 249);
    doc.roundedRect(14, 56, 182, 28, 3, 3, 'F');
    doc.setFontSize(9);
    doc.setTextColor(100, 116, 139);
    doc.text('Geral (Pai)', 20, 65);
    doc.text('Area Comum', 90, 65);
    doc.text('Moradores (Diff)', 155, 65);
    doc.setFontSize(14);
    doc.setTextColor(6, 8, 13);
    doc.text(geralPred.currentTotal.toFixed(1) + ' m³', 20, 78);
    doc.text(comumPred.currentTotal.toFixed(1) + ' m³', 90, 78);
    doc.text(Math.max(0, geralPred.currentTotal - comumPred.currentTotal).toFixed(1) + ' m³', 155, 78);

    doc.setTextColor(30, 41, 59);
    doc.setFontSize(13);
    doc.text('Previsao e Metas', 14, 100);

    doc.setFillColor(241, 245, 249);
    doc.roundedRect(14, 104, 182, 28, 3, 3, 'F');
    doc.setFontSize(9);
    doc.setTextColor(100, 116, 139);
    doc.text('Media Diaria Geral', 20, 113);
    doc.text('Previsao Mensal Geral', 90, 113);
    doc.text('Previsao Mensal Comum', 155, 113);
    doc.setFontSize(14);
    doc.setTextColor(6, 8, 13);
    doc.text(geralPred.daily.toFixed(3) + ' m³/dia', 20, 126);
    doc.text(geralPred.monthPredicted.toFixed(1) + ' m³', 90, 126);
    doc.text(comumPred.monthPredicted.toFixed(1) + ' m³', 155, 126);

    if (waterGoals.GERAL.monthly > 0 || waterGoals.COMUM.monthly > 0) {
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(13);
        doc.text('Metas Definidas', 14, 148);
        doc.setFillColor(241, 245, 249);
        doc.roundedRect(14, 152, 182, 20, 3, 3, 'F');
        doc.setFontSize(9);
        doc.setTextColor(100, 116, 139);
        doc.text('Meta Diaria Geral', 20, 161);
        doc.text('Meta Mensal Geral', 90, 161);
        doc.text('Meta Mensal Comum', 155, 161);
        doc.setFontSize(12);
        doc.setTextColor(6, 8, 13);
        doc.text((waterGoals.GERAL.daily > 0 ? waterGoals.GERAL.daily.toFixed(3) + ' m³' : '-'), 20, 170);
        doc.text((waterGoals.GERAL.monthly > 0 ? waterGoals.GERAL.monthly.toFixed(1) + ' m³' : '-'), 90, 170);
        doc.text((waterGoals.COMUM.monthly > 0 ? waterGoals.COMUM.monthly.toFixed(1) + ' m³' : '-'), 155, 170);
    }

    var geralRows = geralCons.slice(0, 30).map(function(c) {
        return [fmtDate(c.date), c.value.toFixed(3), (c.prevValue || 0).toFixed(3), c.consumption.toFixed(3)];
    });

    if (geralRows.length > 0) {
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(13);
        doc.text('Hidrometro Geral (Pai) - Historico', 14, geralRows.length > 0 && comumCons.length > 0 ? 190 : 148);
        doc.autoTable({
            startY: geralRows.length > 0 && comumCons.length > 0 ? 194 : 152,
            head: [['Data', 'Leitura (m³)', 'Leitura Anterior', 'Consumo (m³)']],
            body: geralRows,
            theme: 'grid',
            styles: { fontSize: 8, cellPadding: 3 },
            headStyles: { fillColor: [14, 165, 233], textColor: 255, fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [248, 250, 252] },
            margin: { left: 14, right: 14 }
        });
    }

    var comumRows = comumCons.slice(0, 30).map(function(c) {
        return [fmtDate(c.date), c.value.toFixed(3), (c.prevValue || 0).toFixed(3), c.consumption.toFixed(3)];
    });

    if (comumRows.length > 0) {
        var finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 14 : 200;
        if (finalY > 250) { doc.addPage(); finalY = 20; }
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(13);
        doc.text('Area Comum - Historico', 14, finalY);
        doc.autoTable({
            startY: finalY + 4,
            head: [['Data', 'Leitura (m³)', 'Leitura Anterior', 'Consumo (m³)']],
            body: comumRows,
            theme: 'grid',
            styles: { fontSize: 8, cellPadding: 3 },
            headStyles: { fillColor: [124, 58, 237], textColor: 255, fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [248, 250, 252] },
            margin: { left: 14, right: 14 }
        });
    }

    var pageCount = doc.internal.getNumberOfPages();
    for (var i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(148, 163, 184);
        doc.text('Portaria Digital - Severino | Pagina ' + i + ' de ' + pageCount, 14, 290);
    }

    var fileName = 'relatorio_agua_' + now.toISOString().slice(0, 10) + '.pdf';
    doc.save(fileName);
    showToast('PDF baixado: ' + fileName, 'success');

    if (waterContact && waterContact.length >= 10) {
        setTimeout(function() {
            openModal(
                '<div class="p-6 text-center"><div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-4"><i class="fa-brands fa-whatsapp text-[#25d366] text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-lg mb-2">PDF Gerado</h3><p class="text-fg-dim mb-1">Arquivo: ' + fileName + '</p><p class="text-muted text-sm mb-5">Deseja enviar para ' + formatPhone(waterContact) + '?</p><div class="flex flex-col gap-3 max-w-xs mx-auto"><a href="' + waUrl(waterContact, '*PORTARIA*\n\nRelatorio de consumo de agua - ' + mesAtual + '\n\nGeral: ' + geralPred.currentTotal.toFixed(1) + ' m³\nArea Comum: ' + comumPred.currentTotal.toFixed(1) + ' m³\n\nO PDF completo ja foi baixado no dispositivo.') + '" target="_blank" class="btn-whatsapp w-full justify-center"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar WhatsApp</a><button class="btn-secondary w-full justify-center" onclick="closeModal()">Fechar</button></div></div>'
            );
        }, 500);
    }
}

function gerarPdfPorData(inicio, fim) {
    var { jsPDF } = window.jspdf;
    var doc = new jsPDF();

    // Transforma as strings de data do calendário para conseguir comparar
    var dtInicio = new Date(inicio + "T00:00:00");
    var dtFim = new Date(fim + "T23:59:59");

    // Pega TODAS as leituras do sistema e filtra apenas as que estão DENTRO das datas escolhidas
    var todasLeituras = (state.readings || []).slice();
    var leiturasFiltradas = todasLeituras.filter(function(r) {
        var dtLeitura = new Date(r.date);
        if (dtLeitura < dtInicio) return false; // Se for antes do início, ignora
        if (dtLeitura > dtFim) return false;     // Se for depois do fim, ignora
        return true;
    });

    // Separa Geral e Comum e ordena do mais velho para o mais novo
    var geralRaw = leiturasFiltradas.filter(function(r){ return r.meterKey === 'GERAL'; }).sort(function(a,b){ return new Date(a.date) - new Date(b.date); });
    var comumRaw = leiturasFiltradas.filter(function(r){ return r.meterKey === 'COMUM'; }).sort(function(a,b){ return new Date(a.date) - new Date(b.date); });

    // Calcula o consumo real SOMENTE com as leituras desse período
    var geralCons = []; var totalGeral = 0;
    for(var i=0; i < geralRaw.length - 1; i++) {
        var diff = geralRaw[i+1].value - geralRaw[i].value;
        if (diff >= 0) { totalGeral += diff; geralCons.push({ date: geralRaw[i+1].date, value: geralRaw[i+1].value, prevValue: geralRaw[i].value, consumption: diff }); }
    }

    var comumCons = []; var totalComum = 0;
    for(var i=0; i < comumRaw.length - 1; i++) {
        var diff = comumRaw[i+1].value - comumRaw[i].value;
        if (diff >= 0) { totalComum += diff; comumCons.push({ date: comumRaw[i+1].date, value: comumRaw[i+1].value, prevValue: comumRaw[i].value, consumption: diff }); }
    }

    // Se não achar leitura nessas datas, avisa
    if (geralCons.length === 0 && comumCons.length === 0) {
        showToast('Nenhuma leitura encontrada entre ' + fmtDateShort(inicio) + ' e ' + fmtDateShort(fim), 'warning');
        return;
    }

    // Formata o texto do período para o título do PDF
    var periodoTexto = fmtDateShort(inicio) + ' a ' + fmtDateShort(fim);
    var now = new Date();

    // Monta o visual do PDF
    doc.setFillColor(6, 8, 13);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(56, 189, 248);
    doc.setFontSize(18);
    doc.text('Relatorio de Consumo de Agua', 14, 18);
    doc.setFontSize(10);
    doc.setTextColor(148, 163, 184);
    doc.text('CAGECE - ' + periodoTexto, 14, 28);
    doc.text('Gerado em: ' + now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }), 14, 35);

    doc.setTextColor(30, 41, 59);
    doc.setFontSize(13);
    doc.text('Resumo do Período', 14, 52);

    doc.setFillColor(241, 245, 249);
    doc.roundedRect(14, 56, 182, 28, 3, 3, 'F');
    doc.setFontSize(9);
    doc.setTextColor(100, 116, 139);
    doc.text('Geral (Pai)', 20, 65);
    doc.text('Area Comum', 90, 65);
    doc.text('Moradores (Diff)', 155, 65);
    doc.setFontSize(14);
    doc.setTextColor(6, 8, 13);
    doc.text(totalGeral.toFixed(1) + ' m³', 20, 78);
    doc.text(totalComum.toFixed(1) + ' m³', 90, 78);
    doc.text(Math.max(0, totalGeral - totalComum).toFixed(1) + ' m³', 155, 78);

    // Tabela Geral
    var geralRows = geralCons.map(function(c) { return [fmtDate(c.date), c.value.toFixed(3), c.prevValue.toFixed(3), c.consumption.toFixed(3)]; });
    if (geralRows.length > 0) {
        doc.setTextColor(30, 41, 59); doc.setFontSize(13);
        doc.text('Hidrometro Geral (Pai)', 14, 100);
        doc.autoTable({ startY: 104, head: [['Data', 'Leitura (m³)', 'Leitura Anterior', 'Consumo (m³)']], body: geralRows, theme: 'grid', styles: { fontSize: 8, cellPadding: 3 }, headStyles: { fillColor: [14, 165, 233], textColor: 255, fontStyle: 'bold' }, alternateRowStyles: { fillColor: [248, 250, 252] }, margin: { left: 14, right: 14 } });
    }

    // Tabela Comum
    var comumRows = comumCons.map(function(c) { return [fmtDate(c.date), c.value.toFixed(3), c.prevValue.toFixed(3), c.consumption.toFixed(3)]; });
    if (comumRows.length > 0) {
        var finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 14 : 200;
        if (finalY > 250) { doc.addPage(); finalY = 20; }
        doc.setTextColor(30, 41, 59); doc.setFontSize(13);
        doc.text('Area Comum', 14, finalY);
        doc.autoTable({ startY: finalY + 4, head: [['Data', 'Leitura (m³)', 'Leitura Anterior', 'Consumo (m³)']], body: comumRows, theme: 'grid', styles: { fontSize: 8, cellPadding: 3 }, headStyles: { fillColor: [124, 58, 237], textColor: 255, fontStyle: 'bold' }, alternateRowStyles: { fillColor: [248, 250, 252] }, margin: { left: 14, right: 14 } });
    }

    // Rodapé
    var pageCount = doc.internal.getNumberOfPages();
    for (var i = 1; i <= pageCount; i++) { doc.setPage(i); doc.setFontSize(8); doc.setTextColor(148, 163, 184); doc.text('Portaria Digital - Severino | Pagina ' + i + ' de ' + pageCount, 14, 290); }

    var fileName = 'relatorio_agua_' + inicio + '_ate_' + fim + '.pdf';
    doc.save(fileName);
    showToast('PDF baixado com sucesso!', 'success');
}
