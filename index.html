<script>
/* ============================================
   FIREBASE CONFIG - JA CONFIGURADO
   ============================================ */
const firebaseConfig = {
    apiKey: "AIzaSyAbmUjMnbisMLtG0hgFfxarzpw2VW6y4uY",
    authDomain: "severino-8dc6b.firebaseapp.com",
    projectId: "severino-8dc6b",
    storageBucket: "severino-8dc6b.firebasestorage.app",
    messagingSenderId: "1016027764459",
    appId: "1:1016027764459:web:eae4d5b38caf298796d0ae"
};

let db = null;
let firebaseOk = false;

function initFirebase() {
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });
        firebaseOk = true;
        return true;
    } catch (e) {
        console.error('Erro init Firebase:', e);
        setStatus('error', 'Erro ao iniciar Firebase: ' + e.message);
        firebaseOk = false;
        return false;
    }
}

/* ============================================
   IMGBB CONFIG
   ============================================ */
function getImgbbKey() { return localStorage.getItem('portaria_imgbb_key') || '' }
function saveImgbbKey(key) { localStorage.setItem('portaria_imgbb_key', key.trim()) }

/* ============================================
   STATUS BAR
   ============================================ */
function setStatus(t, text) {
    const b = document.getElementById('statusBar');
    if (!b) return;
    b.className = 'status-bar ' + t;
    const i = { online: 'fa-cloud', offline: 'fa-database', error: 'fa-triangle-exclamation', syncing: 'fa-sync fa-spin' };
    b.innerHTML = '<i class="fa-solid ' + (i[t] || 'fa-database') + '"></i><span>' + text + '</span>';
}

/* ============================================
   ESTADO
   ============================================ */
const LOCAL_KEY = 'portaria_data_v9';
let state = { residents: [], packages: [], providers: [] };
let qrScanner = null, scannerCallback = null;
let residentSearchQuery = '', packageFilter = 'all', providerSearchQuery = '';
let tempProviderPhotos = [], tempPackagePhoto = null;

/* ============================================
   UTILIDADES
   ============================================ */
function genId() {
    const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let r = '';
    for (let i = 0; i < 20; i++) r += c[Math.floor(Math.random() * c.length)];
    return r;
}
function genCode() {
    const c = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let r = '';
    for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
    return r;
}
function safeP(v) {
    if (!v) return [];
    if (typeof v === 'string') try { return JSON.parse(v) } catch (e) { return [] }
    if (Array.isArray(v)) return v;
    return [];
}
function isB64(s) { return typeof s === 'string' && s.length > 200 && s.startsWith('data:') }
function formatPhone(p) {
    const d = p.replace(/\D/g, '');
    if (d.length === 11) return '(' + d.substr(0, 2) + ') ' + d.substr(2, 5) + '-' + d.substr(7, 4);
    if (d.length === 10) return '(' + d.substr(0, 2) + ') ' + d.substr(2, 4) + '-' + d.substr(6, 4);
    return p;
}
function waUrl(p, m) {
    const d = p.replace(/\D/g, '');
    return 'https://wa.me/' + (d.startsWith('55') ? d : '55' + d) + '?text=' + encodeURIComponent(m);
}
function fmtDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
function isToday(iso) {
    if (!iso) return false;
    const d = new Date(iso), n = new Date();
    return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}
function getR(id) { return state.residents.find(function(r){ return r.id === id }) }
function compressImg(file, maxW, q) {
    maxW = maxW || 800; q = q || 0.5;
    return new Promise(function(res, rej) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxW) { h = (maxW / w) * h; w = maxW }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                res(canvas.toDataURL('image/jpeg', q));
            };
            img.onerror = rej; img.src = e.target.result;
        };
        reader.onerror = rej; reader.readAsDataURL(file);
    });
}

/* ============================================
   TOAST / MODAL
   ============================================ */
function showToast(msg, type) {
    type = type || 'info';
    const c = document.getElementById('toastContainer');
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info', warning: 'fa-triangle-exclamation' };
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function() { t.classList.add('toast-exit'); setTimeout(function() { t.remove() }, 300) }, 4000);
}
function openModal(h) {
    document.getElementById('modalContent').innerHTML = h;

   SCANNER QR / BARRAS
   ============================================ */
function openScanner(cb, title, sub, hint) {
    scannerCallback = cb;
    document.getElementById('scannerTitle').textContent = title || 'Escanear';
    document.getElementById('scannerSubtitle').textContent = sub || '';
    document.getElementById('scannerHint').textContent = hint || '';
    document.getElementById('scanOverlay').style.display = '';
    document.getElementById('scannerModal').classList.add('active');
    document.body.style.overflow = 'hidden';
    var el = document.getElementById('qr-reader');
    el.innerHTML = '';
    setTimeout(function() {
        try {
            qrScanner = new Html5Qrcode('qr-reader');
            qrScanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 260, height: 160 }, aspectRatio: 1.3 }, onScanSuccess, function(){}).catch(function() {
                showToast('Nao foi possivel acessar a camera.', 'error'); stopScanner();
            });
        } catch(e) { stopScanner() }
    }, 300);
}
function onScanSuccess(text) {
    if (navigator.vibrate) navigator.vibrate(100);
    if (qrScanner) qrScanner.pause(true);
    document.getElementById('scanOverlay').style.display = 'none';
    var b = document.getElementById('scannerBody');
    var f = document.createElement('div');
    f.className = 'absolute inset-0 flex items-center justify-center z-10';
    f.style.background = 'rgba(6,8,13,0.85)';
    var safe = text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    f.innerHTML = '<div class="text-center p-6"><div class="w-16 h-16 rounded-full bg-accent/10 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-circle-check text-accent text-3xl"></i></div><p class="text-accent font-heading font-bold text-lg mb-2">Codigo Lido</p><p class="text-fg font-mono text-sm bg-bg/60 rounded-lg px-4 py-3 break-all max-w-xs">' + text + '</p><div class="flex gap-3 mt-5 justify-center"><button class="btn-secondary text-sm" onclick="resumeScanner()"><i class="fa-solid fa-rotate"></i> Outro</button><button class="btn-primary text-sm" onclick="confirmScannedCode(\'' + safe + '\')"><i class="fa-solid fa-check"></i> Usar</button></div></div>';
    b.appendChild(f);
}
function confirmScannedCode(c) { stopScanner(); if (scannerCallback) scannerCallback(c); scannerCallback = null }
function resumeScanner() {
    var b = document.getElementById('scannerBody'), f = b.querySelector('.absolute');
    if (f) f.remove();
    document.getElementById('scanOverlay').style.display = '';
    if (qrScanner) qrScanner.resume();
}
function stopScanner() {
    if (qrScanner) { qrScanner.stop().then(function() { qrScanner.clear(); qrScanner = null }).catch(function() { qrScanner = null }) }
    document.getElementById('scannerModal').classList.remove('active');
    var b = document.getElementById('scannerBody'), f = b.querySelector('.absolute');
    if (f) f.remove();
    if (!document.getElementById('modalOverlay').classList.contains('active')) document.body.style.overflow = '';
}
document.getElementById('scannerModal').addEventListener('click', function(e) { if (e.target === e.currentTarget) stopScanner() });
function openScannerForRegister() {
    openScanner(function(c) { openNewPackageModal(c) }, 'Escanear Encomenda', 'Aponte para o codigo', 'Sera usado como rastreio.');
}
function openScannerForPickup() {
    openScanner(function(c) {
        navigate('retirada');
        setTimeout(function() {
            var i = document.getElementById('pickupCodeInput');
            if (i) { i.value = c.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 6); verifyPickupCode() }
        }, 200);
    }, 'Escanear Retirada', 'QR Code do morador', '');
}

/* ============================================
   UPLOAD IMGBB
   ============================================ */
async function uploadPhotoToImgBB(file, folder) {
    var apiKey = getImgbbKey();
    if (!apiKey) {
        showToast('Configure a chave imgBB nas Configuracoes', 'warning');
        return await compressImg(file, 600, 0.4);
    }
    try {
        var compressed = await compressImg(file, 800, 0.5);
        var base64Data = compressed.split(',')[1];
        var formData = new FormData();
        formData.append('key', apiKey);
        formData.append('image', base64Data);
        formData.append('name', folder + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4));
        var response = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        var result = await response.json();
        if (result.success) return result.data.url;
        else throw new Error(result.error?.message || 'Erro imgBB');
    } catch (error) {
        console.error('Erro upload imgBB:', error);
        showToast('Erro ao enviar foto: ' + error.message, 'error');
        return await compressImg(file, 600, 0.4);
    }
}

   /* ============================================
   BANCO DE DADOS - FIRESTORE (VERSÃO CORRIGIDA)
   ============================================ */
const DB = {
    async load() {
        if (!firebaseOk || !db) {
            this._loadLocal();
            setStatus('offline', 'Modo local - Firebase nao configurado');
            return;
        }
        setStatus('syncing', 'Conectando ao Firebase...');
        try {
            var results = await Promise.all([
                db.collection('residents').orderBy('createdAt', 'asc').get(),
                db.collection('packages').orderBy('receivedAt', 'desc').get(),
                db.collection('providers').orderBy('createdAt', 'desc').get()
            ]);
            state.residents = results[0].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, name: data.name || '', apartment: data.apartment || '', whatsapp: data.whatsapp || '', vehicles: Array.isArray(data.vehicles) ? data.vehicles : [], visitors: Array.isArray(data.visitors) ? data.visitors : [], createdAt: data.createdAt || '' };
            });
            state.packages = results[1].docs.map(function(d) {
                var data = d.data();
                return { id: d.id, code: data.code || '', residentId: data.residentId || '', residentName: data.residentName || '', apartment: data.apartment || '', description: data.description || '', trackingCode: data.trackingCode || '', receivedAt: data.receivedAt || '', status: data.status || 'pending', deliveredAt: data.deliveredAt || null, deliveredTo: data.deliveredTo || null, photoUrl: data.photoUrl || null };
            });
            state.providers = results[2].docs.map(function(d) {
                var data = d.data();
                return { 
                    id: d.id, 
                    residentId: data.residentId || '', 
                    apartment: data.apartment || '', 
                    name: data.name || '', 
                    serviceType: data.serviceType || '', 
                    company: data.company || '', 
                    phone: data.phone || '', 
                    docType: data.docType || '', 
                    docNumber: data.docNumber || '', 
                    photos: Array.isArray(data.photos) ? data.photos : [], 
                    createdAt: data.createdAt || '',
                    accessLog: Array.isArray(data.accessLog) ? data.accessLog : [] // CORREÇÃO: Puxando o histórico do Firebase
                };
            });
            this._saveLocal();
            var imgOk = getImgbbKey() ? 'imgBB OK' : 'imgBB nao configurado';
            setStatus('online', 'Conectado ao Firebase - ' + imgOk);
        } catch (e) {
            console.error('Erro Firebase:', e);
            setStatus('error', 'Erro Firebase: ' + (e.message || 'desconhecido') + ' - usando dados locais');
            this._loadLocal();
        }
    },

    async saveR(r) {
        var data = { name: r.name, apartment: r.apartment, whatsapp: r.whatsapp, vehicles: r.vehicles || [], visitors: r.visitors || [], createdAt: r.createdAt || new Date().toISOString() };
        try { if (firebaseOk && db) await db.collection('residents').doc(r.id).set(data, { merge: true }); } catch (e) { console.error('Erro saveR:', e) }
        this._saveLocal();
    },

    async deleteR(id) {
        try { if (firebaseOk && db) await db.collection('residents').doc(id).delete(); } catch (e) { console.error('Erro deleteR:', e) }
        state.residents = state.residents.filter(function(x) { return x.id !== id });
        this._saveLocal();
    },

    async savePkg(p) {
        var data = { code: p.code, residentId: p.residentId, residentName: p.residentName, apartment: p.apartment, description: p.description, trackingCode: p.trackingCode || '', receivedAt: p.receivedAt, status: p.status, deliveredAt: p.deliveredAt, deliveredTo: p.deliveredTo, photoUrl: p.photoUrl || null };
        try { if (firebaseOk && db) await db.collection('packages').doc(p.id).set(data, { merge: true }); } catch (e) { console.error('Erro savePkg:', e) }
        this._saveLocal();
    },

    async savePv(pv) {
        var data = { 
            residentId: pv.residentId, 
            apartment: pv.apartment, 
            name: pv.name, 
            serviceType: pv.serviceType, 
            company: pv.company, 
            phone: pv.phone, 
            docType: pv.docType, 
            docNumber: pv.docNumber, 
            photos: pv.photos || [], 
            createdAt: pv.createdAt || new Date().toISOString(),
            accessLog: pv.accessLog || [] // CORREÇÃO: Enviando o histórico para o Firebase
        };
        try { if (firebaseOk && db) await db.collection('providers').doc(pv.id).set(data, { merge: true }); } catch (e) { console.error('Erro savePv:', e) }
        this._saveLocal();
    },

    async deletePv(id) {
        try { if (firebaseOk && db) await db.collection('providers').doc(id).delete(); } catch (e) { console.error('Erro deletePv:', e) }
        state.providers = state.providers.filter(function(x) { return x.id !== id });
        this._saveLocal();
    },

    _saveLocal() {
        try {
            var c = {
                residents: state.residents.map(function(r) { return Object.assign({}, r) }),
                packages: state.packages.map(function(p) { return Object.assign({}, p, { photoUrl: isB64(p.photoUrl) ? null : p.photoUrl }) }),
                providers: state.providers.map(function(pv) { 
                    return Object.assign({}, pv, { 
                        photos: (pv.photos || []).filter(function(ph) { return !isB64(ph) }),
                        accessLog: pv.accessLog || [] // CORREÇÃO: Salvando no cache local também
                    }) 
                })
            };
            localStorage.setItem(LOCAL_KEY, JSON.stringify(c));
        } catch (e) { console.error('Erro save local:', e) }
    },
    _loadLocal() {
        try {
            var s = localStorage.getItem(LOCAL_KEY);
            if (s) { 
                var d = JSON.parse(s); 
                state.residents = d.residents || []; 
                state.packages = d.packages || []; 
                state.providers = d.providers || [] 
            }
        } catch (e) { state.residents = []; state.packages = []; state.providers = [] }
    }
};

function collectVehicles() {
    var container = document.getElementById('rVehicles');
    var items = container.querySelectorAll('.dynamic-item');
    var arr = [];
    items.forEach(function(item) {
        var t = item.querySelector('select');
        var b = item.querySelector('input[placeholder="Marca/Modelo"]');
        var p = item.querySelector('input[placeholder="ABC-1D23"]');
        if (b && (b.value.trim() !== '' || p.value.trim() !== '')) arr.push({ type: t.value, brand: b.value.trim(), plate: p.value.toUpperCase().trim() });
    });
    return arr;
}
function collectVisitors() {
    var container = document.getElementById('rVisitors');
    var items = container.querySelectorAll('.dynamic-item');
    var arr = [];
    items.forEach(function(item) {
        var n = item.querySelector('input[placeholder="Nome"]');
        var r = item.querySelector('input[placeholder="Relacao"]');
        if (n && n.value.trim() !== '') arr.push({ name: n.value.trim(), relation: r ? r.value.trim() : '' });

}

    var name = document.getElementById('rName').value.trim();

    if (!apt) { showToast('Informe o apartamento', 'error'); return }
    var vehicles = collectVehicles(); var visitors = collectVisitors();
    if (editId) {

function filterProvidersOnly(val) {

        '</div></div>';
}

function openProviderAccess(id, limit) {
    var pv = state.providers.find(function(x) { return x.id === id });
    if (!pv) return;
    if (!pv.accessLog) pv.accessLog = [];

    var currentLimit = limit || 50;
    var totalLogs = pv.accessLog.length;
    // Pega os logs respeitando o limite para o "Ver Mais"
    var logsToDisplay = pv.accessLog.slice(0, currentLimit);

    var lastLog = pv.accessLog[0];
    var isInside = lastLog && !lastLog.exitTime;

    var logHtml = logsToDisplay.map(function(log) {
        return '<div class="flex items-center justify-between p-3 rounded-lg bg-bg/50 border border-border mb-2">' +
            '<div><p class="text-sm font-bold text-fg">Apto ' + log.apartment + '</p>' +
            '<p class="text-[11px] text-muted">Entrada: ' + fmtDate(log.entryTime) + '</p></div>' +
            '<div class="text-right">' + (log.exitTime ? '<p class="text-[11px] text-success font-medium">Saída: ' + fmtDate(log.exitTime) + '</p>' : 
            '<button class="btn-primary !py-1 !px-3 text-xs" onclick="registerExit(\''+pv.id+'\', \''+log.id+'\')">Registrar Saída</button>') + '</div>' +
        '</div>';
    }).join('');

    var loadMoreBtn = (totalLogs > currentLimit) ? 
        '<button class="w-full py-3 mt-2 text-accent font-bold text-sm border border-dashed border-accent/30 rounded-lg hover:bg-accent/5" onclick="openProviderAccess(\''+id+'\', '+(currentLimit + 50)+')">' +
        '<i class="fa-solid fa-plus"></i> Ver mais (Exibindo ' + currentLimit + ' de ' + totalLogs + ')</button>' : '';

    openModal(
        '<div class="p-6 border-b border-border"><h3 class="font-heading font-bold text-fg text-lg">Acesso: ' + pv.name + '</h3></div>' +
        '<div class="p-6 space-y-4">' +
            (isInside ? 
                '<div class="p-4 rounded-xl bg-warning/10 border border-warning/20 text-center"><p class="text-warning font-bold text-sm">O prestador está DENTRO no Apto ' + lastLog.apartment + '</p></div>' : 
                '<div class="bg-bg p-4 rounded-xl border border-border"> ' +
                    '<label class="form-label">Registrar Nova Entrada (Apto)</label>' +
                    '<div class="flex gap-2"><input type="text" id="accessApt" class="form-input flex-1" value="' + pv.apartment + '">' +
                    '<button class="btn-primary" onclick="registerEntry(\''+pv.id+'\')">Dar Entrada</button></div>' +
                '</div>'
            ) +
            '<div><h4 class="form-label mb-3">Histórico (' + totalLogs + ')</h4>' + 
            '<div class="max-h-80 overflow-y-auto pr-1">' + (logHtml || '<p class="text-muted text-center text-sm py-4">Nenhum registro.</p>') + loadMoreBtn + '</div></div>' +
        '</div>' +
        '<div class="p-6 border-t border-border flex justify-end"><button class="btn-secondary" onclick="closeModal()">Fechar</button></div>'
    );
}

async function registerEntry(pvId) {
    var apt = document.getElementById('accessApt').value.trim();
    if (!apt) { showToast('Informe o apto', 'error'); return; }
    
    // IMPORTANTE: Busca direto no state para garantir persistência
    var pv = state.providers.find(function(x) { return x.id === pvId });
    if (!pv) return;
    
    if (!pv.accessLog) pv.accessLog = [];
    
    var newLog = { 
        id: genId(), 
        apartment: apt, 
        entryTime: new Date().toISOString(), 
        exitTime: null 
    };
    
    // Adiciona ao state local primeiro
    pv.accessLog.unshift(newLog);
    
    // Salva no Firestore
    await DB.savePv(pv);
    
    showToast('Entrada registrada!', 'success');
    openProviderAccess(pvId); // Atualiza o Modal
    renderProviders();        // Atualiza os Cards
}

async function registerExit(pvId, logId) {
    var pv = state.providers.find(function(x) { return x.id === pvId });
    if (!pv || !pv.accessLog) return;
    
    var log = pv.accessLog.find(function(l) { return l.id === logId });
    if (log) {
        log.exitTime = new Date().toISOString();
        
        // Salva o objeto alterado
        await DB.savePv(pv);
        
        showToast('Saída registrada!', 'success');
        openProviderAccess(pvId); // Atualiza o Modal
        renderProviders();        // Atualiza os Cards
    }
}

function closeMobileSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open') }
document.getElementById('hamburgerBtn').addEventListener('click', function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobileOverlay').classList.toggle('open') });
document.getElementById('mobileOverlay').addEventListener('click', closeMobileSidebar);
function updateClock() {
    var n = new Date();
    var t = n.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    var d = n.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'short' });
    var e = document.getElementById('clockDisplay');
    if (e) e.textContent = d + ' - ' + t;
}

/* ============================================
   INICIALIZACAO
   ============================================ */
async function init() {
    initFirebase();
    await DB.load();
    renderDashboard();
    updateClock();
    setInterval(updateClock, 30000);
}
init();
</script>
