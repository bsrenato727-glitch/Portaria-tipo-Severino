    <style>
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#06080d;color:#e2e8f0;overflow-x:hidden}h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0c1018}::-webkit-scrollbar-thumb{background:#1c2a3d;border-radius:3px}

        .stat-card{background:#111a27;border:1px solid #1c2a3d;border-radius:14px;padding:24px;transition:all .3s;position:relative;overflow:hidden}.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--card-accent,#00e5b0),transparent);opacity:0;transition:opacity .3s}.stat-card:hover{border-color:#2a3a52;transform:translateY(-2px)}.stat-card:hover::before{opacity:1}

        .modal-content{background:#111a27;border:1px solid #1c2a3d;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;animation:modalIn .3s cubic-bezier(.4,0,.2,1)}.modal-scanner .modal-content{max-width:480px}

        .code-display{font-family:'Space Grotesk',monospace;font-size:2.5rem;font-weight:700;letter-spacing:8px;color:#00e5b0;text-shadow:0 0 30px rgba(0,229,176,.4);padding:20px;background:rgba(0,229,176,.05);border:2px dashed rgba(0,229,176,.3);border-radius:12px;text-align:center;user-select:all}

        .table-container{overflow-x:auto}.data-table{width:100%;border-collapse:collapse}.data-table th{text-align:left;padding:14px 16px;font-size:.75rem;font-weight:700;color:#5a6b80;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1c2a3d;white-space:nowrap}.data-table td{padding:14px 16px;border-bottom:1px solid #0f1722;font-size:.9rem;white-space:nowrap}.data-table tbody tr{transition:background .15s}.data-table tbody tr:hover{background:rgba(0,229,176,.03)}

        @keyframes codePulse{0%,100%{text-shadow:0 0 30px rgba(0,229,176,.4)}50%{text-shadow:0 0 50px rgba(0,229,176,.7),0 0 80px rgba(0,229,176,.2)}}.code-pulse{animation:codePulse 2s ease-in-out infinite}

        #qr-reader{width:100%}#qr-reader video{border-radius:12px!important}#qr-reader__scan_region{border-radius:12px;overflow:hidden}#qr-reader__dashboard{margin-top:12px}
        #qr-reader__dashboard button{background:#1c2a3d!important;color:#94a3b8!important;border:1px solid #2a3a52!important;border-radius:8px!important;padding:8px 16px!important;font-family:'DM Sans'!important;cursor:pointer!important}

        #qr-reader__dashboard select{background:#0c1018!important;color:#e2e8f0!important;border:1px solid #1c2a3d!important;border-radius:8px!important;padding:8px!important}
        .scan-overlay{position:absolute;inset:0;pointer-events:none;z-index:5;border-radius:12px;overflow:hidden}.scan-overlay::before{content:'';position:absolute;left:10%;right:10%;height:3px;background:linear-gradient(90deg,transparent,#00e5b0,transparent);box-shadow:0 0 15px rgba(0,229,176,.6);animation:scanLine 2.5s ease-in-out infinite}.scan-overlay::after{content:'';position:absolute;inset:15%;border:2px solid rgba(0,229,176,.4);border-radius:12px}@keyframes scanLine{0%{top:0}50%{top:calc(100% - 3px)}100%{top:0}}
        .photo-upload{border:2px dashed #1c2a3d;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#0c1018}.photo-upload:hover{border-color:#2a3a52;background:#111a27}.photo-upload.has-photo{border-style:solid;border-color:#00e5b0;padding:8px}
        .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
        .photo-grid-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid #1c2a3d;background:#0c1018;aspect-ratio:3/4}.photo-grid-item img{width:100%;height:100%;object-fit:cover}.photo-grid-item .photo-label{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.7rem;color:#94a3b8}.photo-grid-item .photo-remove{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,.7);border:1px solid rgba(239,68,68,.3);color:#ef4444;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;opacity:0;transition:opacity .2s}.photo-grid-item:hover .photo-remove{opacity:1}
        .delivered-info{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:10px;padding:12px 14px}.di-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem}.di-label{color:#5a6b80}.di-value{color:#e2e8f0;font-weight:500}
        .status-bar{padding:8px 16px;font-size:.78rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1c2a3d;flex-wrap:wrap}
        .status-bar.online{background:rgba(34,197,94,.08);color:#86efac}.status-bar.offline{background:rgba(245,158,11,.08);color:#fbbf24}.status-bar.error{background:rgba(239,68,68,.08);color:#fca5a5}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

<body class="min-h-screen">
    <div class="bg-glow"></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay"><div class="modal-content" id="modalContent"></div></div>
    <div class="modal-overlay modal-scanner" id="scannerModal">
        <div class="modal-content" style="max-width:480px">
            <div class="p-5 border-b border-border flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-sky-500/10 flex items-center justify-center"><i class="fa-solid fa-qrcode text-sky-400"></i></div><div><h3 class="font-heading font-bold text-fg text-base" id="scannerTitle">Escanear</h3><p class="text-muted text-xs" id="scannerSubtitle"></p></div></div><button class="btn-icon" onclick="stopScanner()"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="p-5 relative" id="scannerBody"><div id="qr-reader"></div><div class="scan-overlay" id="scanOverlay"></div></div>
            <div class="p-4 border-t border-border"><div class="flex items-center gap-3 text-sm text-muted"><i class="fa-solid fa-circle-info text-sky-400"></i><span id="scannerHint"></span></div></div>
        </div>
    </div>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="flex min-h-screen relative z-10">
        <aside class="sidebar w-[260px] bg-surface border-r border-border flex flex-col fixed h-full" id="sidebar">
            <div class="p-6 border-b border-border"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-accent-glow border border-accent/30 flex items-center justify-center"><i class="fa-solid fa-shield-halved text-accent text-lg"></i></div><div><h1 class="text-fg font-heading font-bold text-lg leading-tight">Portaria</h1><span class="text-muted text-xs font-medium">Sistema Digital</span></div></div></div>
            <nav class="flex-1 p-4 flex flex-col gap-1">
                <button class="sidebar-link active" data-section="dashboard"><i class="fa-solid fa-chart-pie"></i> Painel Geral</button>
                <button class="sidebar-link" data-section="moradores"><i class="fa-solid fa-building-user"></i> Moradores</button>
                <button class="sidebar-link" data-section="prestadores"><i class="fa-solid fa-id-card-clip"></i> Prestadores</button>
                <button class="sidebar-link" data-section="encomendas"><i class="fa-solid fa-boxes-stacked"></i> Encomendas</button>
                <button class="sidebar-link" data-section="retirada"><i class="fa-solid fa-barcode"></i> Retirada</button>
                <div class="border-t border-border my-3"></div>
                <button class="sidebar-link" data-section="config"><i class="fa-solid fa-gear"></i> Configuracao</button>
            </nav>
            <div class="p-4 border-t border-border"><div class="flex items-center gap-3 px-3 py-2"><div class="w-8 h-8 rounded-full bg-card flex items-center justify-center"><i class="fa-solid fa-user-shield text-muted text-sm"></i></div><div><p class="text-fg text-sm font-medium">Porteiro</p><p class="text-muted text-xs">Turno ativo</p></div><div class="w-2 h-2 rounded-full bg-success ml-auto"></div></div></div>
        </aside>
        <main class="flex-1 ml-0 md:ml-[260px]">
            <header class="sticky top-0 z-40 bg-bg/80 backdrop-blur-xl border-b border-border">
                <div id="statusBar" class="status-bar offline"><i class="fa-solid fa-database"></i><span>Inicializando...</span></div>
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center gap-4"><button class="hamburger btn-icon" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button><div><h2 class="text-fg font-heading font-bold text-xl" id="pageTitle">Painel Geral</h2><p class="text-muted text-sm" id="pageSubtitle">Visao geral</p></div></div>
                    <div class="flex items-center gap-3"><span class="text-muted text-sm hidden sm:block" id="clockDisplay"></span><button class="btn-scan text-sm" onclick="openScannerForRegister()"><i class="fa-solid fa-qrcode"></i> <span class="hidden sm:inline">Escanear</span></button><button class="btn-primary text-sm" onclick="openNewPackageModal()"><i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Nova Encomenda</span></button></div>
                </div>
            </header>
            <div class="p-6">
                <section class="section active" id="section-dashboard"></section>
                <section class="section" id="section-moradores"></section>
                <section class="section" id="section-prestadores"></section>
                <section class="section" id="section-encomendas"></section>
                <section class="section" id="section-retirada"></section>
                <section class="section" id="section-config"></section>
            </div>

<script>
/* ============================================
   CONFIGURACOES
   ============================================ */
function getConfig(){
    try{
        const c=localStorage.getItem('portaria_config');
        return c?JSON.parse(c):{url:'',key:'',imgbbKey:''};
    }catch(e){return{url:'',key:'',imgbbKey:''}}
}
function saveConfig(url,key,imgbbKey){
    localStorage.setItem('portaria_config',JSON.stringify({url,key,imgbbKey:imgbbKey||''}));
}

/* ============================================
   SUPABASE CLIENT
   ============================================ */
let sb=null, dbMode='local';

function initSupabase(){
    const cfg=getConfig();
    if(!cfg.url||!cfg.key){
        setStatus('offline','Modo local - configure o Supabase e imgBB para salvar na nuvem');
        dbMode='local';
        return false;
    }
    try{
        sb=window.supabase.createClient(cfg.url,cfg.key);
        dbMode='cloud';
        return true;
    }catch(e){
        console.error('Erro Supabase:',e);
        setStatus('error','Erro ao criar cliente: '+e.message);
        dbMode='local';
        return false;
    }
}

function setStatus(t,text){
    const b=document.getElementById('statusBar');
    if(!b)return;
    b.className='status-bar '+t;
    const i={online:'fa-cloud',offline:'fa-database',error:'fa-triangle-exclamation',syncing:'fa-sync fa-spin'};
    b.innerHTML=`<i class="fa-solid ${i[t]||'fa-database'}"></i><span>${text}</span>`;
}

/* ============================================
   ESTADO DA APLICACAO
   ============================================ */
const LOCAL_KEY='portaria_data_v8';
let state={residents:[],packages:[],providers:[]};
let qrScanner=null, scannerCallback=null, vehicleCounter=0, visitorCounter=0;
let residentSearchQuery='', packageFilter='all', providerSearchQuery='';
let tempProviderPhotos=[], tempPackagePhoto=null;

/* ============================================
   UTILIDADES
   ============================================ */
function genId(){return'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function genCode(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function safeP(v){if(!v)return[];if(typeof v==='string')try{return JSON.parse(v)}catch(e){return[]}if(Array.isArray(v))return v;return[]}
function isB64(s){return typeof s==='string'&&s.length>200&&s.startsWith('data:')}
function formatPhone(p){const d=p.replace(/\D/g,'');if(d.length===11)return`(${d.substr(0,2)}) ${d.substr(2,5)}-${d.substr(7,4)}`;if(d.length===10)return`(${d.substr(0,2)}) ${d.substr(2,4)}-${d.substr(6,4)}`;return p}
function waUrl(p,m){const d=p.replace(/\D/g,'');return`https://wa.me/${d.startsWith('55')?d:'55'+d}?text=${encodeURIComponent(m)}`}
function fmtDate(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function isToday(iso){if(!iso)return false;const d=new Date(iso),n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()}
function getR(id){return state.residents.find(r=>r.id===id)}
function compressImg(file,maxW=800,q=0.5){return new Promise((res,rej)=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=(maxW/w)*h;w=maxW}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);res(canvas.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};reader.onerror=rej;reader.readAsDataURL(file)})}

/* ============================================
   TOAST / MODAL
   ============================================ */
function showToast(msg,type='info'){
    const c=document.getElementById('toastContainer');
    const icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info',warning:'fa-triangle-exclamation'};
    const t=document.createElement('div');
    t.className=`toast ${type}`;
    t.innerHTML=`<i class="fa-solid ${icons[type]||icons.info}"></i><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{t.classList.add('toast-exit');setTimeout(()=>t.remove(),300)},4000);
}

function openModal(h){
    document.getElementById('modalContent').innerHTML=h;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow='hidden';
    setTimeout(()=>{const f=document.querySelector('#modalContent input,#modalContent select');if(f)f.focus()},100);
}
function closeModal(){
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow='';
}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();stopScanner()}});

/* ============================================
   SCANNER QR / BARRAS
   ============================================ */
function openScanner(cb,title,sub,hint){
    scannerCallback=cb;
    document.getElementById('scannerTitle').textContent=title||'Escanear';
    document.getElementById('scannerSubtitle').textContent=sub||'';
    document.getElementById('scannerHint').textContent=hint||'';
    document.getElementById('scanOverlay').style.display='';
    document.getElementById('scannerModal').classList.add('active');
    document.body.style.overflow='hidden';
    const el=document.getElementById('qr-reader');
    el.innerHTML='';
    setTimeout(()=>{
        try{
            qrScanner=new Html5Qrcode('qr-reader');
            qrScanner.start(
                {facingMode:'environment'},
                {fps:10,qrbox:{width:260,height:160},aspectRatio:1.3},
                onScanSuccess,
                ()=>{}
            ).catch(()=>{
                showToast('Nao foi possivel acessar a camera.','error');
                stopScanner();
            });
        }catch(e){stopScanner()}

}

function onScanSuccess(text){
    if(navigator.vibrate)navigator.vibrate(100);

    const b=document.getElementById('scannerBody');
    const f=document.createElement('div');
    f.className='absolute inset-0 flex items-center justify-center z-10';

/* --- Upload de foto para imgBB --- */
async function uploadPhotoToImgBB(file, folder){
    const cfg=getConfig();
    const apiKey=cfg.imgbbKey;
    if(!apiKey){
        showToast('Configure a chave imgBB nas Configuracoes','warning');
        return await compressImg(file,600,0.4);
    }
    try{
        /* Comprime antes de enviar */
        const compressed=await compressImg(file,800,0.5);
        const base64Data=compressed.split(',')[1];

        const formData=new FormData();
        formData.append('key',apiKey);
        formData.append('image',base64Data);
        formData.append('name',folder+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,4));

        const response=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:formData});
        const result=await response.json();

        if(result.success){
            return result.data.url;
        }else{
            throw new Error(result.error?.message||'Erro imgBB');
        }
    }catch(error){
        console.error('Erro upload imgBB:',error);
        showToast('Erro ao enviar foto: '+error.message,'error');
        return await compressImg(file,600,0.4);
    }
}

const DB={
    /* --- Carregar dados --- */
    async load(){
        if(dbMode==='cloud'){
            setStatus('syncing','Conectando ao banco...');
            try{
                const[rRes,pRes,pvRes]=await Promise.all([
                    sb.from('residents').select('*').order('created_at',{ascending:true}),
                    sb.from('packages').select('*').order('received_at',{ascending:false}),
                    sb.from('providers').select('*').order('created_at',{ascending:false})
                ]);
                state.residents=(rRes.data||[]).map(this._mapR);
                state.packages=(pRes.data||[]).map(this._mapP);
                state.providers=(pvRes.data||[]).map(this._mapPv);
                this._saveLocal();
                const cfg=getConfig();
                const imgOk=cfg.imgbbKey?'imgBB OK':'imgBB nao configurado';
                setStatus('online','Conectado ao Supabase - '+imgOk);
                return;
            }catch(e){
                console.error('Erro Supabase:',e);
                setStatus('error','Erro ao conectar: '+(e.message||'desconhecido')+' - usando dados locais');
                dbMode='local';
            }
        }
        this._loadLocal();
        setStatus('offline','Modo local - '+state.residents.length+' moradores, '+state.packages.length+' encomendas');
    },

    /* --- Salvar Morador --- */
    async saveR(r){
        const row=this._unmapR(r);
        if(dbMode==='cloud'&&sb){
            try{
                let res;
                if(r._sbId){res=await sb.from('residents').update(row).eq('id',r._sbId).select().single()}
                else{res=await sb.from('residents').insert(row).select().single()}
                if(res.data){r._sbId=res.data.id;r.id=res.data.local_id||r.id}
            }catch(e){console.error('Erro saveR:',e)}
        }
        this._saveLocal();
    },

    /* --- Deletar Morador --- */
    async deleteR(id){
        const r=state.residents.find(x=>x.id===id);
        if(dbMode==='cloud'&&sb&&r&&r._sbId){try{await sb.from('residents').delete().eq('id',r._sbId)}catch(e){}}
        state.residents=state.residents.filter(x=>x.id!==id);
        this._saveLocal();
    },

    /* --- Salvar Encomenda --- */
    async savePkg(p){
        const row=this._unmapP(p);
        if(dbMode==='cloud'&&sb){
            try{
                let res;
                if(p._sbId){res=await sb.from('packages').update(row).eq('id',p._sbId).select().single()}
                else{res=await sb.from('packages').insert(row).select().single()}
                if(res.data){p._sbId=res.data.id;p.id=res.data.local_id||p.id}
            }catch(e){console.error('Erro savePkg:',e)}
        }
        this._saveLocal();
    },

    /* --- Salvar Prestador --- */
    async savePv(pv){
        const row=this._unmapPv(pv);
        if(dbMode==='cloud'&&sb){
            try{
                let res;
                if(pv._sbId){res=await sb.from('providers').update(row).eq('id',pv._sbId).select().single()}
                else{res=await sb.from('providers').insert(row).select().single()}
                if(res.data){pv._sbId=res.data.id;pv.id=res.data.local_id||pv.id}
            }catch(e){console.error('Erro savePv:',e)}
        }
        this._saveLocal();
    },

    /* --- Deletar Prestador --- */
    async deletePv(id){
        const pv=state.providers.find(x=>x.id===id);
        if(dbMode==='cloud'&&sb&&pv&&pv._sbId){try{await sb.from('providers').delete().eq('id',pv._sbId)}catch(e){}}
        state.providers=state.providers.filter(x=>x.id!==id);
        this._saveLocal();
    },

    /* --- Mapeamentos Supabase <-> Local --- */
    _mapR(r){return{id:r.local_id||genId(),_sbId:r.id,name:r.name||'',apartment:r.apartment||'',whatsapp:r.whatsapp||'',vehicles:safeP(r.vehicles),visitors:safeP(r.visitors)}},
    _unmapR(r){return{local_id:r.id,name:r.name,apartment:r.apartment,whatsapp:r.whatsapp,vehicles:JSON.stringify(r.vehicles||[]),visitors:JSON.stringify(r.visitors||[])}},
    _mapP(p){return{id:p.local_id||genId(),_sbId:p.id,code:p.code||'',residentId:p.resident_id||'',residentName:p.resident_name||'',apartment:p.apartment||'',description:p.description||'',trackingCode:p.tracking_code||'',receivedAt:p.received_at,status:p.status||'pending',deliveredAt:p.delivered_at,deliveredTo:p.delivered_to||null,photoUrl:p.photo_url||null}},
    _unmapP(p){return{local_id:p.id,code:p.code,resident_id:p.residentId,resident_name:p.residentName,apartment:p.apartment,description:p.description,tracking_code:p.trackingCode||'',received_at:p.receivedAt,status:p.status,delivered_at:p.deliveredAt,delivered_to:p.deliveredTo,photo_url:p.photoUrl||null}},
    _mapPv(pv){return{id:pv.local_id||genId(),_sbId:pv.id,residentId:pv.resident_id||'',apartment:pv.apartment||'',name:pv.name||'',serviceType:pv.service_type||'',company:pv.company||'',phone:pv.phone||'',docType:pv.doc_type||'',docNumber:pv.doc_number||'',photos:safeP(pv.photos)}},
    _unmapPv(pv){return{local_id:pv.id,resident_id:pv.residentId,apartment:pv.apartment,name:pv.name,service_type:pv.serviceType,company:pv.company,phone:pv.phone,doc_type:pv.docType,doc_number:pv.docNumber,photos:JSON.stringify(pv.photos||[])}},

    /* --- LocalStorage --- */
    _saveLocal(){
        try{
            const c={
                residents:state.residents.map(r=>({...r})),
                packages:state.packages.map(p=>({...p,photoUrl:isB64(p.photoUrl)?null:p.photoUrl})),
                providers:state.providers.map(pv=>({...pv,photos:(pv.photos||[]).filter(ph=>!isB64(ph))}))
            };
            localStorage.setItem(LOCAL_KEY,JSON.stringify(c));
        }catch(e){console.error('Erro save local:',e)}
    },
    _loadLocal(){
        try{
            const s=localStorage.getItem(LOCAL_KEY);
            if(s){const d=JSON.parse(s);state.residents=d.residents||[];state.packages=d.packages||[];state.providers=d.providers||[]}
        }catch(e){state.residents=[];state.packages=[];state.providers=[]}
    }
};

async function testAndSave(){

    const imgbb=document.getElementById('cfgImgbb').value.trim();
    if(!url||!key){showToast('Preencha URL e Key do Supabase','error');return}
    if(!imgbb){showToast('Preencha a chave imgBB para fotos','warning');return}
    saveConfig(url,key,imgbb);
    setStatus('syncing','Testando...');
    try{
        const test=window.supabase.createClient(url,key);
        await test.from('residents').select('id').limit(1);
        sb=test;dbMode='cloud';
        showToast('Conexao OK!','success');
        await DB.load();
        renderConfig();
    }catch(e){
        setStatus('error','Erro: '+(e.message||e.msg||'verifique URL e Key'));
        showToast('Erro na conexao','error');
        dbMode='local';
    }
}

async function saveR(editId){
    const n=document.getElementById('frmName').value.trim();
    const a=document.getElementById('frmApt').value.trim();
    const w=document.getElementById('frmWa').value.trim();
    if(!n){showToast('Informe o nome','error');return}
    if(!a){showToast('Informe o apartamento','error');return}
    if(!w||w.replace(/\D/g,'').length<10){showToast('WhatsApp invalido','error');return}
    const vehs=[];
    document.querySelectorAll('#vList .dynamic-item').forEach(i=>{
        const t=i.querySelector('[data-vt]')?.value||'';
        const b=i.querySelector('[data-vb]')?.value.trim()||'';
        const m=i.querySelector('[data-vm]')?.value.trim()||'';
        const p=i.querySelector('[data-vp]')?.value.trim().toUpperCase()||'';
        if(b||m||p)vehs.push({type:t,brand:b,model:m,plate:p});
    });
    const viss=[];
    document.querySelectorAll('#viList .dynamic-item').forEach(i=>{
        const n2=i.querySelector('[data-vin]')?.value.trim()||'';
        const r=i.querySelector('[data-vir]')?.value||'';
        if(n2)viss.push({name:n2,relation:r});
    });
    if(editId){
        const idx=state.residents.findIndex(r=>r.id===editId);
        if(idx!==-1){
            state.residents[idx]={...state.residents[idx],name:n,apartment:a,whatsapp:w,vehicles:vehs,visitors:viss};
            state.packages.forEach(p=>{if(p.residentId===editId){p.residentName=n;p.apartment=a}});
            await DB.saveR(state.residents[idx]);
        }
        showToast('Atualizado','success');
    }else{
        const nr={id:genId(),name:n,apartment:a,whatsapp:w,vehicles:vehs,visitors:viss,createdAt:new Date().toISOString()};
        state.residents.push(nr);
        await DB.saveR(nr);
        showToast('Cadastrado','success');
    }
    closeModal();renderResidents();
}

    const co=document.getElementById('pvCo').value.trim();
    const ph=document.getElementById('pvPh').value.trim();
    const dt=document.getElementById('pvDt').value;
    const dn=document.getElementById('pvDn').value.trim();

    const r=getR(rid), apt=r?r.apartment:'';
    const data={name:n,residentId:rid,apartment:apt,serviceType:st,company:co,phone:ph,docType:dt,docNumber:dn,photos:[...tempProviderPhotos]};
    if(editId){
        const idx=state.providers.findIndex(p=>p.id===editId);

function scanTc(){
    scannerCallback=(code)=>{
        const i=document.getElementById('pkgTc');
        if(i)i.value=code;
        showToast('Codigo preenchido','success');
    };
    document.getElementById('scannerTitle').textContent='Escanear Rastreio';
    document.getElementById('scannerSubtitle').textContent='Codigo da encomenda';
    document.getElementById('scanOverlay').style.display='';
    document.getElementById('scannerModal').classList.add('active');
    const el=document.getElementById('qr-reader');el.innerHTML='';

        try{
            qrScanner=new Html5Qrcode('qr-reader');
            qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160},aspectRatio:1.3},onScanSuccess,()=>{}).catch(()=>{showToast('Erro na camera','error');stopScanner()});
        }catch(e){stopScanner()}

async function handlePkgPh(file){
    if(!file)return;
    try{
        const url=await uploadPhotoToImgBB(file,'pkg');
        tempPackagePhoto=url;
        document.getElementById('pkgPhPl').style.display='none';
        document.getElementById('pkgPhPr').style.display='block';
        document.getElementById('pkgPhImg').src=url;
        document.getElementById('pkgPhArea').classList.add('has-photo');
        showToast('Foto salva','success');
    }catch(e){showToast('Erro na foto','error')}

async function registerPkg(){
    const rid=document.getElementById('pkgRid').value;

    const r=getR(rid);if(!r)return;
    const code=genCode(), now=new Date().toISOString();
    const np={id:genId(),code,residentId:r.id,residentName:r.name,apartment:r.apartment,description:desc,trackingCode:tc,receivedAt:now,status:'pending',deliveredAt:null,deliveredTo:null,photoUrl:tempPackagePhoto};
    state.packages.push(np);

function openDeliver(pkgId){

async function execDeliver(pkgId){
    const dt=document.getElementById('delTo')?.value.trim();
    if(!dt){showToast('Informe quem recebeu','error');return}
    const p=state.packages.find(x=>x.id===pkgId);if(!p)return;
    const now=new Date().toISOString();
    p.status='delivered';p.deliveredAt=now;p.deliveredTo=dt;
    await DB.savePkg(p);
    const r=getR(p.residentId);
    if(r){
        const msg=`*PORTARIA*\n\n✅ Encomenda entregue!\n\n• Codigo: ${p.code}\n• Descricao: ${p.description}\n• Apto: ${p.apartment}\n\n👤 Recebida por: *${dt}*\n\n🕐 ${fmtDate(now)}\n\nCaso nao tenha sido voce, contate a portaria.`;
        const wa=waUrl(r.whatsapp,msg);
        closeModal();
        openModal(`<div class="p-8 text-center"><div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-5"><i class="fa-solid fa-circle-check text-success text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-xl mb-2">Entregue</h3><p class="text-fg-dim mb-1"><strong class="text-accent">${p.code}</strong></p><p class="text-muted text-sm mb-4">Recebida por <strong class="text-fg">${dt}</strong></p><div class="delivered-info text-left mb-6"><div class="di-row"><span class="di-label">Morador</span><span class="di-value">${p.residentName}</span></div><div class="di-row"><span class="di-label">Recebida por</span><span class="di-value text-accent">${dt}</span></div><div class="di-row"><span class="di-label">Data/Hora</span><span class="di-value">${fmtDate(now)}</span></div></div><a href="${wa}" target="_blank" class="btn-whatsapp w-full justify-center mb-3"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar Confirmacao</a><button class="btn-secondary w-full justify-center" onclick="closeModal();renderPackages()">Fechar</button></div>`);
    }else{closeModal();showToast('Entregue','success');renderPackages()}

function verifyPickupCode(){
    const code=document.getElementById('pickupCodeInput').value.trim().toUpperCase();
    const rd=document.getElementById('pickupResult');
    if(!code){showToast('Digite o codigo','warning');return}
    const pkg=state.packages.find(p=>p.code===code&&p.status==='pending');
    if(!pkg){
        const ap=state.packages.find(p=>p.code===code);
        if(ap&&ap.status==='delivered'){
            rd.innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20 text-center"><i class="fa-solid fa-circle-check text-success text-2xl mb-2"></i><p class="text-success font-heading font-bold">Ja Retirada</p><p class="text-muted text-sm mt-1">${fmtDate(ap.deliveredAt)}</p>${ap.deliveredTo?`<p class="text-fg-dim text-sm">Recebida por: ${ap.deliveredTo}</p>`:''}</div>`;
        }else{
            rd.innerHTML=`<div class="p-5 rounded-xl bg-danger/5 border border-danger/20 text-center"><i class="fa-solid fa-circle-xmark text-danger text-2xl mb-2"></i><p class="text-danger font-heading font-bold">Nao Encontrado</p></div>`;

        return;

    rd.innerHTML=`<div class="p-5 rounded-xl bg-accent/5 border border-accent/20"><div class="flex items-start gap-4 mb-4"><div class="w-12 h-12 rounded-xl bg-accent-glow flex items-center justify-center shrink-0"><i class="fa-solid fa-box text-accent text-lg"></i></div><div class="flex-1"><p class="text-fg font-heading font-bold text-lg mb-1">Encontrada</p><div class="code-display text-xl py-3">${pkg.code}</div></div></div>${pkg.photoUrl?`<div class="flex justify-center mb-4"><img src="${pkg.photoUrl}" class="w-20 h-20 object-cover rounded-xl border border-border"></div>`:''}<div class="space-y-2 mb-4 text-sm"><div class="flex justify-between py-2 border-b border-border"><span class="text-muted">Morador</span><span class="text-fg">${pkg.residentName}</span></div><div class="flex justify-between py-2 border-b border-border"><span class="text-muted">Apto</span><span class="text-fg">${pkg.apartment}</span></div><div class="flex justify-between py-2"><span class="text-muted">Descricao</span><span class="text-fg">${pkg.description}</span></div></div><div class="mb-4"><label class="form-label">Quem esta retirando?</label><input type="text" class="form-input" id="pickupRcv" placeholder="Nome..."></div><button class="btn-primary w-full justify-center py-3 text-base" onclick="execPickup('${pkg.id}')"><i class="fa-solid fa-check-double"></i> Liberar e Avisar</button></div>`;

    const r=getR(p.residentId);
    if(r){
        const msg=`*PORTARIA*\n\n✅ Encomenda entregue!\n\n• Codigo: ${p.code}\n• Descricao: ${p.description}\n• Apto: ${p.apartment}\n\n👤 Recebida por: *${dt}*\n\n🕐 ${fmtDate(now)}\n\nCaso nao tenha sido voce, contate a portaria.`;
        const wa=waUrl(r.whatsapp,msg);
        document.getElementById('pickupCodeInput').value='';
        document.getElementById('pickupResult').innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20"><div class="text-center mb-4"><i class="fa-solid fa-circle-check text-success text-3xl mb-2"></i><p class="text-success font-heading font-bold text-lg">Liberada</p><p class="text-fg-dim text-sm">Recebida por <strong class="text-fg">${dt}</strong></p></div><a href="${wa}" target="_blank" class="btn-whatsapp w-full justify-center mb-2"><i class="fa-brands fa-whatsapp"></i> Enviar Confirmacao</a><button class="btn-secondary w-full justify-center" onclick="document.getElementById('pickupResult').innerHTML=''">Fechar</button></div>`;
        showToast('Liberada','success');
        setTimeout(renderPickup,4000);
    }else{
        document.getElementById('pickupCodeInput').value='';
        document.getElementById('pickupResult').innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20 text-center"><i class="fa-solid fa-circle-check text-success text-3xl mb-2"></i><p class="text-success font-heading font-bold">Liberada</p></div>`;
        showToast('Liberada','success');
        setTimeout(renderPickup,2500);
    }
}

/* ============================================
   MOBILE
   ============================================ */
function closeMobileSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('open')}
document.getElementById('hamburgerBtn').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobileOverlay').classList.toggle('open')});
document.getElementById('mobileOverlay').addEventListener('click',closeMobileSidebar);

function updateClock(){
    const n=new Date();
    const t=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const d=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'});
    const e=document.getElementById('clockDisplay');
    if(e)e.textContent=`${d} - ${t}`;
}

/* ============================================
   INICIALIZACAO
   ============================================ */
async function init(){
    initSupabase();
    await DB.load();
    renderDashboard();
    updateClock();
    setInterval(updateClock,30000);
}
init();
</script>
