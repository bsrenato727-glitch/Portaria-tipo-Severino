<script>
/*
██████████████████████████████████████████████████████████
  CONFIGURAÇÃO DO SUPABASE
  Siga o passo a passo no final deste arquivo para configurar
██████████████████████████████████████████████████████████*/
const SUPABASE_URL = 'https://enevbbyaydjolntwndvc.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuZXZiYnlheWRqb2xudHduZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNjEsImV4cCI6MjA5MzM2MTM2MX0.OGXxlv6hujNQ0BwvqFgPSSNmcYeoYqQNjdr4Yt6ng-I';

let sb = null;
let isOnline = false;

if (SUPABASE_URL && SUPABASE_ANON_KEY) {
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); isOnline = true; }
    catch(e) { console.warn('Supabase init error', e); }
}

function updateDbBanner() {
    const b = document.getElementById('dbBanner');
    if (isOnline) { b.className = 'db-banner online'; b.innerHTML = '<i class="fa-solid fa-cloud"></i><span>Banco de dados conectado — dados salvos na nuvem</span>'; }
    else { b.className = 'db-banner offline'; b.innerHTML = '<i class="fa-solid fa-database"></i><span>Modo local — dados no navegador (configure o Supabase para nuvem)</span>'; }
}

// ============================================
// ESTADO LOCAL
// ============================================
const LOCAL_KEY = 'portaria_v5';
let state = { residents: [], packages: [], providers: [], currentSection: 'dashboard' };
let qrScanner = null, scannerCallback = null, vehicleCounter = 0, visitorCounter = 0;
let residentSearchQuery = '', packageFilter = 'all', providerSearchQuery = '';
let tempProviderPhotos = [], tempPackagePhoto = null;

// ============================================
// BANCO DE DADOS — CAMADA DE ACESSO
// ============================================
const DB = {
    async load() {
        if (!isOnline) { this._loadLocal(); return; }
        try {
            const [rRes, pRes, pvRes] = await Promise.all([
                sb.from('residents').select('*').order('created_at', { ascending: true }),
                sb.from('packages').select('*').order('received_at', { ascending: false }),
                sb.from('providers').select('*').order('created_at', { ascending: false })
            ]);
            state.residents = (rRes.data || []).map(this._mapResident);
            state.packages = (pRes.data || []).map(this._mapPackage);
            state.providers = (pvRes.data || []).map(this._mapProvider);
            this._saveLocal(); // cache local
        } catch(e) {
            console.error('Erro ao carregar do Supabase:', e);
            showToast('Erro ao conectar ao banco, usando dados locais', 'warning');
            this._loadLocal();
            isOnline = false; updateDbBanner();
        }
    },

    async saveResident(r) {
        const row = this._unmapResident(r);
        if (isOnline) {
            try {
                if (r._sbId) { const { data } = await sb.from('residents').update(row).eq('id', r._sbId).select().single(); if(data) Object.assign(r, this._mapResident(data)); }
                else { const { data } = await sb.from('residents').insert(row).select().single(); if(data) Object.assign(r, this._mapResident(data)); }
            } catch(e) { console.error('Erro Supabase resident:', e); }
        }
        this._syncLocal(); return r;
    },

    async deleteResident(id) {
        const r = state.residents.find(x => x.id === id);
        if (isOnline && r && r._sbId) { try { await sb.from('residents').delete().eq('id', r._sbId); } catch(e) {} }
        state.residents = state.residents.filter(x => x.id !== id);
        this._syncLocal();
    },

    async savePackage(p) {
        const row = this._unmapPackage(p);
        if (isOnline) {
            try {
                if (p._sbId) { const { data } = await sb.from('packages').update(row).eq('id', p._sbId).select().single(); if(data) Object.assign(p, this._mapPackage(data)); }
                else { const { data } = await sb.from('packages').insert(row).select().single(); if(data) Object.assign(p, this._mapPackage(data)); }
            } catch(e) { console.error('Erro Supabase package:', e); }
        }
        this._syncLocal(); return p;
    },

    async saveProvider(p) {
        const row = this._unmapProvider(p);
        if (isOnline) {
            try {
                if (p._sbId) { const { data } = await sb.from('providers').update(row).eq('id', p._sbId).select().single(); if(data) Object.assign(p, this._mapProvider(data)); }
                else { const { data } = await sb.from('providers').insert(row).select().single(); if(data) Object.assign(p, this._mapProvider(data)); }
            } catch(e) { console.error('Erro Supabase provider:', e); }
        }
        this._syncLocal(); return p;
    },

    async deleteProvider(id) {
        const p = state.providers.find(x => x.id === id);
        if (isOnline && p && p._sbId) { try { await sb.from('providers').delete().eq('id', p._sbId); } catch(e) {} }
        state.providers = state.providers.filter(x => x.id !== id);
        this._syncLocal();
    },

    async uploadPhoto(file, bucket, path) {
        if (!isOnline) return await compressImage(file);
        try {
            const compressed = await compressImage(file);
            const blob = await (await fetch(compressed)).blob();
            const ext = file.name.split('.').pop() || 'jpg';
            const fullName = path + '_' + Date.now() + '.' + ext;
            const { data, error } = await sb.storage.from(bucket).upload(fullName, blob, { upsert: true, contentType: 'image/jpeg' });
            if (error) throw error;
            const { data: urlData } = sb.storage.from(bucket).getPublicUrl(fullName);
            return urlData.publicUrl;
        } catch(e) {
            console.warn('Upload falhou, salvando local:', e);
            return await compressImage(file);
        }
    },

    // Mapeadores
    _mapResident(r) { return { id: r.local_id || generateId(), _sbId: r.id, name: r.name, apartment: r.apartment, whatsapp: r.whatsapp, vehicles: r.vehicles || [], visitors: r.visitors || [], createdAt: r.created_at }; },
    _unmapResident(r) { return { local_id: r.id, name: r.name, apartment: r.apartment, whatsapp: r.whatsapp, vehicles: JSON.stringify(r.vehicles || []), visitors: JSON.stringify(r.visitors || []) }; },
    _mapPackage(p) { return { id: p.local_id || generateId(), _sbId: p.id, code: p.code, residentId: p.resident_id, residentName: p.resident_name, apartment: p.apartment, description: p.description, trackingCode: p.tracking_code || '', receivedAt: p.received_at, status: p.status, deliveredAt: p.delivered_at, deliveredTo: p.delivered_to || null, photoUrl: p.photo_url || null }; },
    _unmapPackage(p) { return { local_id: p.id, code: p.code, resident_id: p.residentId, resident_name: p.residentName, apartment: p.apartment, description: p.description, tracking_code: p.trackingCode || '', received_at: p.receivedAt, status: p.status, delivered_at: p.deliveredAt, delivered_to: p.deliveredTo, photo_url: p.photoUrl || null }; },
    _mapProvider(p) { return { id: p.local_id || generateId(), _sbId: p.id, residentId: p.resident_id, apartment: p.apartment, name: p.name, serviceType: p.service_type, company: p.company || '', phone: p.phone || '', docType: p.doc_type, docNumber: p.doc_number || '', photos: p.photos || [], createdAt: p.created_at }; },
    _unmapProvider(p) { return { local_id: p.id, resident_id: p.residentId, apartment: p.apartment, name: p.name, service_type: p.serviceType, company: p.company, phone: p.phone, doc_type: p.docType, doc_number: p.docNumber, photos: JSON.stringify(p.photos || []) }; },

    _loadLocal() { try { const s = localStorage.getItem(LOCAL_KEY); if(s) { const d=JSON.parse(s); state.residents=d.residents||[]; state.packages=d.packages||[]; state.providers=d.providers||[]; } } catch(e){} },
    _saveLocal() { try { localStorage.setItem(LOCAL_KEY, JSON.stringify({residents:state.residents,packages:state.packages,providers:state.providers})); } catch(e){} },
    _syncLocal() { this._saveLocal(); }
};

function generateId(){return'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function generateCode(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function formatPhone(p){const d=p.replace(/\D/g,'');if(d.length===11)return`(${d.substr(0,2)}) ${d.substr(2,5)}-${d.substr(7,4)}`;if(d.length===10)return`(${d.substr(0,2)}) ${d.substr(2,4)}-${d.substr(6,4)}`;return p}
function waUrl(p,m){const d=p.replace(/\D/g,'');return`https://wa.me/${d.startsWith('55')?d:'55'+d}?text=${encodeURIComponent(m)}`}
function fmtDate(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function isToday(iso){if(!iso)return false;const d=new Date(iso),n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()}
function getR(id){return state.residents.find(r=>r.id===id)}
function compressImage(file,maxW=800,q=0.5){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=(maxW/w)*h;w=maxW}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

function showToast(msg,type='info'){const c=document.getElementById('toastContainer'),icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info',warning:'fa-triangle-exclamation'};const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fa-solid ${icons[type]||icons.info}"></i><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('toast-exit');setTimeout(()=>t.remove(),300)},4000)}
function openModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modalOverlay').classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>{const f=document.querySelector('#modalContent input,#modalContent select');if(f)f.focus()},100)}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');document.body.style.overflow=''}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();stopScanner()}});

function openScanner(cb,title,sub,hint){scannerCallback=cb;document.getElementById('scannerTitle').textContent=title||'Escanear';document.getElementById('scannerSubtitle').textContent=sub||'';document.getElementById('scannerHint').textContent=hint||'';document.getElementById('scanOverlay').style.display='';document.getElementById('scannerModal').classList.add('active');document.body.style.overflow='hidden';const el=document.getElementById('qr-reader');el.innerHTML='';setTimeout(()=>{try{qrScanner=new Html5Qrcode('qr-reader');qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160},aspectRatio:1.3},onScanSuccess,()=>{}).catch(()=>{showToast('Não foi possível acessar a câmera.','error');stopScanner()})}catch(e){stopScanner()}},300)}
function onScanSuccess(text){if(navigator.vibrate)navigator.vibrate(100);if(qrScanner)qrScanner.pause(true);document.getElementById('scanOverlay').style.display='none';const b=document.getElementById('scannerBody'),f=document.createElement('div');f.className='absolute inset-0 flex items-center justify-center z-10';f.style.background='rgba(6,8,13,0.85)';const safeText=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');f.innerHTML=`<div class="text-center p-6"><div class="w-16 h-16 rounded-full bg-accent/10 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-circle-check text-accent text-3xl"></i></div><p class="text-accent font-heading font-bold text-lg mb-2">Código Lido</p><p class="text-fg font-mono text-sm bg-bg/60 rounded-lg px-4 py-3 break-all max-w-xs">${text}</p><div class="flex gap-3 mt-5 justify-center"><button class="btn-secondary text-sm" onclick="resumeScanner()"><i class="fa-solid fa-rotate"></i> Outro</button><button class="btn-primary text-sm" onclick="confirmScannedCode('${safeText}')"><i class="fa-solid fa-check"></i> Usar</button></div></div>`;b.appendChild(f)}
function confirmScannedCode(c){stopScanner();if(scannerCallback)scannerCallback(c);scannerCallback=null}
function resumeScanner(){const b=document.getElementById('scannerBody'),f=b.querySelector('.absolute');if(f)f.remove();document.getElementById('scanOverlay').style.display='';if(qrScanner)qrScanner.resume()}
function stopScanner(){if(qrScanner){qrScanner.stop().then(()=>{qrScanner.clear();qrScanner=null}).catch(()=>{qrScanner=null})}document.getElementById('scannerModal').classList.remove('active');const b=document.getElementById('scannerBody'),f=b.querySelector('.absolute');if(f)f.remove();if(!document.getElementById('modalOverlay').classList.contains('active'))document.body.style.overflow=''}
document.getElementById('scannerModal').addEventListener('click',e=>{if(e.target===e.currentTarget)stopScanner()});
function openScannerForRegister(){openScanner(c=>{openNewPackageModal(c)},'Escanear Encomenda','Aponte para o código','Será usado como rastreio.')}
function openScannerForPickup(){openScanner(c=>{navigate('retirada');setTimeout(()=>{const i=document.getElementById('pickupCodeInput');if(i){i.value=c.toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,6);verifyPickupCode()}},200)},'Escanear Retirada','QR Code do morador','')}

async function saveResident(editId){const n=document.getElementById('frmName').value.trim(),a=document.getElementById('frmApartment').value.trim(),w=document.getElementById('frmWhatsapp').value.trim();if(!n){showToast('Informe o nome','error');return}if(!a){showToast('Informe o apartamento','error');return}if(!w||w.replace(/\D/g,'').length<10){showToast('WhatsApp inválido','error');return}

function scanTracking(){scannerCallback=(code)=>{const i=document.getElementById('pkgTracking');if(i)i.value=code;showToast('Código preenchido','success')};document.getElementById('scannerTitle').textContent='Escanear Rastreio';document.getElementById('scannerSubtitle').textContent='Código da encomenda';document.getElementById('scanOverlay').style.display='';document.getElementById('scannerModal').classList.add('active');const el=document.getElementById('qr-reader');el.innerHTML='';setTimeout(()=>{try{qrScanner=new Html5Qrcode('qr-reader');qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160},aspectRatio:1.3},onScanSuccess,()=>{}).catch(()=>{showToast('Erro na câmera','error');stopScanner()})}catch(e){stopScanner()}},300)}

async function handlePkgPhoto(file){if(!file)return;try{const url=await DB.uploadPhoto(file,'encomendas','pkg');tempPackagePhoto=url;document.getElementById('pkgPhotoPlaceholder').style.display='none';const preview=document.getElementById('pkgPhotoPreview');preview.style.display='block';document.getElementById('pkgPhotoImg').src=url;document.getElementById('pkgPhotoArea').classList.add('has-photo');showToast('Foto salva','success')}catch(e){showToast('Erro ao salvar foto','error')}}

async function registerPackage(){const rid=document.getElementById('pkgResident').value,desc=document.getElementById('pkgDescription').value.trim(),tc=document.getElementById('pkgTracking')?.value.trim()||'';if(!rid){showToast('Selecione o morador','error');return}if(!desc){showToast('Descreva a encomenda','error');return}const r=getR(rid);if(!r)return;const code=generateCode(),now=new Date().toISOString();const np={id:generateId(),code,residentId:r.id,residentName:r.name,apartment:r.apartment,description:desc,trackingCode:tc,receivedAt:now,status:'pending',deliveredAt:null,deliveredTo:null,photoUrl:tempPackagePhoto};state.packages.push(np);await DB.savePackage(np);
const ti=tc?`\n• Rastreio: ${tc}`:'';const msg=`*PORTARIA*\n\nOlá, ${r.name.split(' ')[0]}! 👋\n\n📦 Uma encomenda chegou para você:\n\n• Descrição: ${desc}${ti}\n• Apartamento: ${r.apartment}\n\n🔐 *Seu código de retirada: ${code}*\n\nApresente este código na portaria para retirar sua encomenda, sem necessidade de assinatura.\n\nRecebida em: ${fmtDate(now)}`;const wa=waUrl(r.whatsapp,msg);
document.getElementById('modalContent').innerHTML=`<div class="p-8 text-center"><div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-5"><i class="fa-solid fa-circle-check text-success text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-xl mb-2">Encomenda Registrada</h3><p class="text-fg-dim mb-4"><strong class="text-fg">${r.name}</strong> - Apto ${r.apartment}</p>${tempPackagePhoto?`<img src="${tempPackagePhoto}" class="w-32 h-32 object-cover rounded-xl mx-auto mb-4 border border-border">`:''}${tc?`<p class="text-muted text-sm mb-3">Rastreio: <span class="text-fg-dim font-mono">${tc}</span></p>`:''}<div class="code-display code-pulse mb-4">${code}</div><p class="text-muted text-sm mb-6">Código de retirada</p><div class="flex flex-col gap-3 max-w-xs mx-auto"><a href="${wa}" target="_blank" class="btn-whatsapp w-full justify-center"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar pelo WhatsApp</a><button class="btn-secondary w-full justify-center" onclick="navigator.clipboard.writeText('${code}').then(()=>showToast('Copiado','success'))"><i class="fa-solid fa-copy"></i> Copiar Código</button></div></div><div class="p-6 border-t border-border flex items-center justify-center"><button class="btn-secondary" onclick="closeModal();renderPackages()">Fechar</button></div>`;
tempPackagePhoto=null}

function resendNotif(id){const p=state.packages.find(x=>x.id===id);if(!p)return;const r=getR(p.residentId);if(!r)return;window.open(waUrl(r.whatsapp,`*PORTARIA*\n\nOlá, ${r.name.split(' ')[0]}! 👋\n\n📦 Sua encomenda ainda está aguardando:\n\n• Descrição: ${p.description}\n• Apartamento: ${p.apartment}\n\n🔐 *Código de retirada: ${p.code}*\n\nApresente este código na portaria.`),'_blank');showToast('WhatsApp aberto','success')}

// ============================================
// ENTREGA COM QUEM RECEBEU + WHATSAPP
// ============================================
function openDeliverModal(pkgId){const p=state.packages.find(x=>x.id===pkgId);if(!p)return;
openModal(`<div class="p-6 border-b border-border"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-green-500/10 flex items-center justify-center"><i class="fa-solid fa-box-open text-success"></i></div><h3 class="font-heading font-bold text-fg text-lg">Confirmar Entrega</h3></div><p class="text-muted text-sm ml-[52px]">Informe quem recebeu</p></div>
<div class="p-6 space-y-4">
 ${p.photoUrl?`<div class="flex justify-center"><img src="${p.photoUrl}" class="w-24 h-24 object-cover rounded-xl border border-border"></div>`:''}
<div class="delivered-info"><div class="di-row"><span class="di-label">Código</span><span class="di-value font-heading font-bold text-accent">${p.code}</span></div><div class="di-row"><span class="di-label">Morador</span><span class="di-value">${p.residentName}</span></div><div class="di-row"><span class="di-label">Apto</span><span class="di-value">${p.apartment}</span></div><div class="di-row"><span class="di-label">Descrição</span><span class="di-value">${p.description}</span></div>${p.trackingCode?`<div class="di-row"><span class="di-label">Rastreio</span><span class="di-value font-mono text-xs">${p.trackingCode}</span></div>`:''}</div>
<div><label class="form-label">Quem está recebendo?</label><input type="text" class="form-input" id="deliverToInput" placeholder="Ex: Maria Aparecida, o próprio morador..."></div>
<div class="p-3 rounded-lg bg-sky-500/5 border border-sky-500/15 text-sm text-muted flex items-start gap-2"><i class="fa-solid fa-circle-info text-sky-400 mt-0.5 shrink-0"></i><span>Ao confirmar, será enviada mensagem de confirmação ao morador pelo WhatsApp.</span></div></div>
<div class="p-6 border-t border-border flex items-center justify-end gap-3"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="executeDelivery('${p.id}')"><i class="fa-solid fa-check-double"></i> Confirmar e Avisar</button></div>`);
setTimeout(()=>{const i=document.getElementById('deliverToInput');if(i)i.focus()},150)}

async function executeDelivery(pkgId){const dt=document.getElementById('deliverToInput')?.value.trim();if(!dt){showToast('Informe quem recebeu','error');return}const p=state.packages.find(x=>x.id===pkgId);if(!p)return;const now=new Date().toISOString();p.status='delivered';p.deliveredAt=now;p.deliveredTo=dt;await DB.savePackage(p);
const r=getR(p.residentId);if(r){const ti=p.trackingCode?`\n• Rastreio: ${p.trackingCode}`:'';const msg=`*PORTARIA*\n\n✅ Encomenda entregue!\n\n📦 Detalhes:\n• Código: ${p.code}\n• Descrição: ${p.description}${ti}\n• Apartamento: ${p.apartment}\n\n👤 Recebida por: *${dt}*\n\n🕐 Data/Hora: ${fmtDate(now)}\n\nCaso não tenha sido você, entre em contato com a portaria.`;const wa=waUrl(r.whatsapp,msg);closeModal();
openModal(`<div class="p-8 text-center"><div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-5"><i class="fa-solid fa-circle-check text-success text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-xl mb-2">Entrega Confirmada</h3><p class="text-fg-dim mb-1">Código <strong class="text-accent font-heading">${p.code}</strong></p><p class="text-muted text-sm mb-4">Recebida por <strong class="text-fg">${dt}</strong></p>
<div class="delivered-info text-left mb-6"><div class="di-row"><span class="di-label">Morador</span><span class="di-value">${p.residentName}</span></div><div class="di-row"><span class="di-label">Apartamento</span><span class="di-value">${p.apartment}</span></div><div class="di-row"><span class="di-label">Recebida por</span><span class="di-value text-accent">${dt}</span></div><div class="di-row"><span class="di-label">Data/Hora</span><span class="di-value">${fmtDate(now)}</span></div></div>
<a href="${wa}" target="_blank" class="btn-whatsapp w-full justify-center mb-3"><i class="fa-brands fa-whatsapp text-lg"></i> Enviar Confirmação pelo WhatsApp</a>
<button class="btn-secondary w-full justify-center" onclick="closeModal();renderPackages()">Fechar</button></div>`)}else{closeModal();showToast('Entrega confirmada','success');renderPackages()}}

// ============================================
// RETIRADA
// ============================================
function renderPickup(){const pc=state.packages.filter(p=>p.status==='pending').length;
document.getElementById('section-retirada').innerHTML=`<div class="max-w-lg mx-auto"><div class="data-card p-8 mb-6"><div class="text-center mb-8"><div class="w-20 h-20 rounded-2xl bg-accent-glow border border-accent/20 flex items-center justify-center mx-auto mb-5"><i class="fa-solid fa-barcode text-accent text-3xl"></i></div><h3 class="font-heading font-bold text-fg text-2xl mb-2">Retirada de Encomenda</h3><p class="text-muted">Código ou escaneie o QR</p></div>
<button class="btn-scan w-full justify-center text-base py-3 mb-5" onclick="openScannerForPickup()"><i class="fa-solid fa-camera"></i> Escanear QR / Código de Barras</button>
<div class="flex items-center gap-4 mb-5"><div class="flex-1 h-px bg-border"></div><span class="text-muted text-xs uppercase">ou digite</span><div class="flex-1 h-px bg-border"></div></div>
<div class="mb-4"><label class="form-label text-center block">Código de Retirada</label><input type="text" class="form-input text-center font-heading font-bold text-xl tracking-[6px] uppercase" id="pickupCodeInput" placeholder="K7N3W9" maxlength="6" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')" onkeydown="if(event.key==='Enter')verifyPickupCode()"></div>
<button class="btn-primary w-full justify-center text-base py-3" onclick="verifyPickupCode()"><i class="fa-solid fa-magnifying-glass"></i> Verificar</button>
<div id="pickupResult" class="mt-6"></div></div>
<div class="data-card p-6"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-lg bg-yellow-500/10 flex items-center justify-center"><i class="fa-solid fa-box-open text-warning"></i></div><p class="text-fg font-medium">${pc} pendente(s)</p></div><div class="flex flex-col gap-2 max-h-48 overflow-y-auto">${state.packages.filter(p=>p.status==='pending').map(p=>`<div class="flex items-center justify-between py-2 px-3 rounded-lg bg-bg/50"><div class="flex items-center gap-3">${p.photoUrl?`<img src="${p.photoUrl}" class="w-7 h-7 rounded object-cover">`:''}<span class="font-heading font-bold text-accent text-sm">${p.code}</span><span class="text-fg-dim text-sm">${p.residentName}</span></div><span class="text-muted text-xs">Apto ${p.apartment}</span></div>`).join('')||'<p class="text-muted text-sm text-center py-2">Nenhuma</p>'}</div></div></div>`}

function verifyPickupCode(){const code=document.getElementById('pickupCodeInput').value.trim().toUpperCase(),rd=document.getElementById('pickupResult');if(!code){showToast('Digite o código','warning');return}
const pkg=state.packages.find(p=>p.code===code&&p.status==='pending');
if(!pkg){const ap=state.packages.find(p=>p.code===code);if(ap&&ap.status==='delivered'){rd.innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20 text-center"><i class="fa-solid fa-circle-check text-success text-2xl mb-2"></i><p class="text-success font-heading font-bold">Já Retirada</p><p class="text-muted text-sm mt-1">${fmtDate(ap.deliveredAt)}</p>${ap.deliveredTo?`<p class="text-fg-dim text-sm">Recebida por: ${ap.deliveredTo}</p>`:''}</div>`}else{rd.innerHTML=`<div class="p-5 rounded-xl bg-danger/5 border border-danger/20 text-center"><i class="fa-solid fa-circle-xmark text-danger text-2xl mb-2"></i><p class="text-danger font-heading font-bold">Não Encontrado</p></div>`}return}
rd.innerHTML=`<div class="p-5 rounded-xl bg-accent/5 border border-accent/20"><div class="flex items-start gap-4 mb-4"><div class="w-12 h-12 rounded-xl bg-accent-glow flex items-center justify-center shrink-0"><i class="fa-solid fa-box text-accent text-lg"></i></div><div class="flex-1"><p class="text-fg font-heading font-bold text-lg mb-1">Encontrada</p><div class="code-display text-xl py-3">${pkg.code}</div></div></div>
 ${pkg.photoUrl?`<div class="flex justify-center mb-4"><img src="${pkg.photoUrl}" class="w-20 h-20 object-cover rounded-xl border border-border"></div>`:''}
<div class="space-y-2 mb-4 text-sm"><div class="flex justify-between py-2 border-b border-border"><span class="text-muted">Morador</span><span class="text-fg">${pkg.residentName}</span></div><div class="flex justify-between py-2 border-b border-border"><span class="text-muted">Apto</span><span class="text-fg">${pkg.apartment}</span></div><div class="flex justify-between py-2 border-b border-border"><span class="text-muted">Descrição</span><span class="text-fg">${pkg.description}</span></div><div class="flex justify-between py-2"><span class="text-muted">Recebida</span><span class="text-fg">${fmtDate(pkg.receivedAt)}</span></div></div>
<div class="mb-4"><label class="form-label">Quem está retirando?</label><input type="text" class="form-input" id="pickupReceiver" placeholder="Nome de quem retira..."></div>
<button class="btn-primary w-full justify-center py-3 text-base" onclick="execPickup('${pkg.id}')"><i class="fa-solid fa-check-double"></i> Liberar e Avisar</button></div>`;
setTimeout(()=>{const i=document.getElementById('pickupReceiver');if(i)i.focus()},100)}

async function execPickup(pkgId){const dt=document.getElementById('pickupReceiver')?.value.trim();if(!dt){showToast('Informe quem retira','error');return}const p=state.packages.find(x=>x.id===pkgId);if(!p)return;const now=new Date().toISOString();p.status='delivered';p.deliveredAt=now;p.deliveredTo=dt;await DB.savePackage(p);
const r=getR(p.residentId);if(r){const msg=`*PORTARIA*\n\n✅ Encomenda entregue!\n\n📦 Detalhes:\n• Código: ${p.code}\n• Descrição: ${p.description}\n• Apartamento: ${p.apartment}\n\n👤 Recebida por: *${dt}*\n\n🕐 Data/Hora: ${fmtDate(now)}\n\nCaso não tenha sido você, entre em contato com a portaria.`;const wa=waUrl(r.whatsapp,msg);
document.getElementById('pickupCodeInput').value='';document.getElementById('pickupResult').innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20"><div class="text-center mb-4"><i class="fa-solid fa-circle-check text-success text-3xl mb-2"></i><p class="text-success font-heading font-bold text-lg">Liberada</p><p class="text-fg-dim text-sm">Recebida por <strong class="text-fg">${dt}</strong></p></div><div class="delivered-info mb-4"><div class="di-row"><span class="di-label">Morador</span><span class="di-value">${p.residentName}</span></div><div class="di-row"><span class="di-label">Recebida por</span><span class="di-value text-accent">${dt}</span></div></div><a href="${wa}" target="_blank" class="btn-whatsapp w-full justify-center mb-2"><i class="fa-brands fa-whatsapp"></i> Enviar Confirmação</a><button class="btn-secondary w-full justify-center" onclick="document.getElementById('pickupResult').innerHTML=''">Fechar</button></div>`;showToast('Liberada','success');setTimeout(renderPickup,4000)}else{document.getElementById('pickupCodeInput').value='';document.getElementById('pickupResult').innerHTML=`<div class="p-5 rounded-xl bg-green-500/5 border border-green-500/20 text-center"><i class="fa-solid fa-circle-check text-success text-3xl mb-2"></i><p class="text-success font-heading font-bold">Liberada</p></div>`;showToast('Liberada','success');setTimeout(renderPickup,2500)}}

// Mobile
function closeMobileSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('active')}
document.getElementById('hamburgerBtn').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobileOverlay').classList.toggle('open')});
document.getElementById('mobileOverlay').addEventListener('click',closeMobileSidebar);
function updateClock(){const n=new Date(),t=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),d=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'});const e=document.getElementById('clockDisplay');if(e)e.textContent=`${d} - ${t}`}

async function init(){updateDbBanner();await DB.load();renderDashboard();updateClock();setInterval(updateClock,30000)}
init();
</script>
</body>
</html>
